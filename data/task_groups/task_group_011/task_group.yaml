        - train_tasks/004/eval/eval.py
      rubric:
        - goal: Correct adverse-rated loan count and balance.
          weight: 2
        - goal: Correct watch-list risk classes.
          weight: 3
        - goal: Correct stressed DSCR breach set.
          weight: 3
        - goal: Correct largest problem exposure and action.
          weight: 2
        - goal: Correct underwater projected-loss classification.
          weight: 2
        - goal: Correct severe payment-status by rating bucket counts.
          weight: 2
        - goal: Correct monitoring cadence.
          weight: 1
  - task_id: train_005
    input: train_tasks/005/input/
    prompt_txt: train_tasks/005/input/prompt.txt
    payloads:
      - train_tasks/005/input/payloads/answer_template.json
    notes: train_tasks/005/notes/notes.md
    output: train_tasks/005/output/
