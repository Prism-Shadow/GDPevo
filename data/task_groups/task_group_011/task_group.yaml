        - goal: Correct stressed DSCR values and breach flags.
          weight: 2
        - goal: Correct selected application and path enum.
          weight: 3
        - goal: Correct post-approval CRE concentration.
          weight: 2
        - goal: Correct FDIC delinquency benchmark variance.
          weight: 2
        - goal: Correct condition set for the selected credit.
          weight: 2
        - goal: Correct deferral reason set for the unselected credit.
          weight: 1

