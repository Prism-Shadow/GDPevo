task_group:
  task_group_id: task_group_011
  scenario_id: SCN_011_bank_branch_credit_risk_lending_committee
  source_examples:
    - E001
    - E002
    - E003
  domain: Finance
  description: |
    A train-predict task group for branch credit-risk and lending-committee
    work. Agents use a shared generated credit-office environment to analyze
    loan portfolios, risk ratings, FDIC and NCUA benchmarks, application
    queues, concentration limits, stress tests, and committee controls.

env:
  setup: env/setup.sh
  files:
    - env/setup.sh
    - env/generate_data.py
    - env/server.py
    - env/data/credit_office.db
    - env/data/public_manifest.json
    - env/data/branches.json
    - env/data/policies.json
    - env/data/fdic_q4_2024.json
    - env/data/ncua_q1_2025.csv
    - env/data/credit_union_segments.json

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/eval.py
      rubric:
        - goal: Correct target regrade loan count and exposure.
          weight: 2
        - goal: Correct final-rating exposure totals.
          weight: 3
        - goal: Correct material-downgrade loan set.
          weight: 3
        - goal: Correct NPA ratio and FDIC benchmark variance.
          weight: 2
        - goal: Correct top problem credit and action.
          weight: 2
        - goal: Correct migration distribution for current rating 3 loans.
          weight: 2
        - goal: Correct watch-list action coverage.
          weight: 1
  - task_id: train_002
    input: train_tasks/002/input/
    prompt_txt: train_tasks/002/input/prompt.txt
    payloads:
      - train_tasks/002/input/payloads/answer_template.json
    notes: train_tasks/002/notes/notes.md
    output: train_tasks/002/output/
    answer_json: train_tasks/002/output/answer.json
    eval:
      script: train_tasks/002/eval/eval.sh
      files:
        - train_tasks/002/eval/eval.sh
        - train_tasks/002/eval/eval.py
      rubric:
        - goal: Correct application decision sets.
          weight: 3
        - goal: Correct committed and remaining capacity.
          weight: 2
        - goal: Correct concentration-breach handling for the strong healthcare applicant.
          weight: 3
        - goal: Correct high-risk consumer decline reason codes.
          weight: 2
        - goal: Correct startup SBA conditional structure.
          weight: 2
        - goal: Correct post-approval concentration metrics.
          weight: 2
        - goal: Correct priority ranking.
          weight: 1
  - task_id: train_003
    input: train_tasks/003/input/
    prompt_txt: train_tasks/003/input/prompt.txt
    payloads:
      - train_tasks/003/input/payloads/answer_template.json
    notes: train_tasks/003/notes/notes.md
    output: train_tasks/003/output/
    answer_json: train_tasks/003/output/answer.json
    eval:
      script: train_tasks/003/eval/eval.sh
      files:
        - train_tasks/003/eval/eval.sh
        - train_tasks/003/eval/eval.py
      rubric:
        - goal: Correct segment posture.
          weight: 3
        - goal: Correct state benchmark metrics.
          weight: 2
        - goal: Correct peer-state comparison directions.
          weight: 2
        - goal: Correct capacity and risk-tolerance interpretation.
          weight: 2
        - goal: Correct required checklist gate set.
          weight: 2
        - goal: Correct added operating controls.
          weight: 2
        - goal: Correct escalation triggers and owners.
          weight: 1
  - task_id: train_004
    input: train_tasks/004/input/
    prompt_txt: train_tasks/004/input/prompt.txt
    payloads:
      - train_tasks/004/input/payloads/answer_template.json
