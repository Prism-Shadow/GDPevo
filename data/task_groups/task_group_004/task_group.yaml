task_group:
  task_group_id: task_group_004
  scenario_id: SCN_004_crm_retention_churn_analytics
  source_examples:
    - E001
    - E002
    - E003
  domain: CRM
  description: |
    ApexCloud Retention Operations is a shared CRM analytics benchmark for
    retention risk triage, QBR metric preparation, churn model validation,
    receivables-driven follow-up, and quarter-end operations review. Train
    and test tasks use the same generated business environment and require
    agents to transfer source precedence, clean-data conventions, pipeline
    aggregation habits, and controlled business-action labels.

env:
  dockerfile: env/Dockerfile
  setup: env/setup.sh
  state_mode: read_only
  files:
    - env/endpoints.txt
    - env/Dockerfile
    - env/judge_api.py
    - env/judge_train_eval/train_001/eval/eval.sh
    - env/judge_train_eval/train_001/output/answer.json
    - env/judge_train_eval/train_002/eval/eval.sh
    - env/judge_train_eval/train_002/output/answer.json
    - env/judge_train_eval/train_003/eval/eval.sh
    - env/judge_train_eval/train_003/output/answer.json
    - env/judge_train_eval/train_004/eval/eval.sh
    - env/judge_train_eval/train_004/output/answer.json
    - env/judge_train_eval/train_005/eval/eval.sh
    - env/judge_train_eval/train_005/output/answer.json
    - env/setup.sh
    - env/generate_data.py
    - env/server.py
    - env/manifest.json
    - env/data/accounts.json
    - env/data/account_metrics.json
    - env/data/support_tickets.json
    - env/data/nps_responses.json
    - env/data/billing_snapshots.json
    - env/data/ar_aging.json
    - env/data/opportunities.json
    - env/data/hr_summary.json
    - env/data/event_performance.json
    - env/data/churn_train.csv
    - env/data/churn_validation.csv
    - env/data/churn_candidates.csv
    - env/data/account_metric_extract.csv

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
      rubric:
        - goal: Correct ordered top-5 renewal-risk account ids.
          weight: 3
        - goal: Correct risk scores and risk levels for the top-5 accounts.
          weight: 3
        - goal: Correct primary retention action for each top-5 account.
          weight: 2
        - goal: Correct current ARR values using the proper revenue source.
          weight: 2
        - goal: Correct clean ticket counts and latest NPS handling.
          weight: 2
        - goal: Correct overdue balances and collections count.
          weight: 2
        - goal: Correct portfolio counts and ARR at risk.
          weight: 2
        - goal: Correct model check fields.
          weight: 1
        - goal: Correct retention policy code fields.
          weight: 3
