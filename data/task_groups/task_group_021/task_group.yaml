    - env/judge_tasks/train_002/eval/eval.sh
    - env/judge_tasks/train_002/eval/eval_impl.sh
    - env/judge_tasks/train_002/eval/whole_point_eval.py
    - env/judge_tasks/train_002/output/answer.json
    - env/judge_tasks/train_003/eval/eval.sh
    - env/judge_tasks/train_003/eval/eval_impl.sh
    - env/judge_tasks/train_003/eval/whole_point_eval.py
    - env/judge_tasks/train_003/output/answer.json
