task_group:
  task_group_id: task_group_021
  scenario_id: SCN_021_data_cleaning_quality_pipeline
  source_examples:
    - E001
    - E002
    - E003
  domain: Data Analysis
  description: |
    A train-predict benchmark for certifying operational data in the shared
    Asteria Fleet Data Quality Hub. Formal train and test tasks cover contact
    master canonicalization, effective-reference transaction normalization,
    and maintenance-event integrity reconstruction across noisy, overlapping
    sources. Every rubric item is a binary business-quality gate: its evaluator
    checks a disjoint bundle of deterministic business-result paths and awards
    either the point's full normalized weight or zero. Every path in a bundle
    must match; structurally incomplete answers fail the output contract.

