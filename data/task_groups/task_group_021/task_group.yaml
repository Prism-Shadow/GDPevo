    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/eval_impl.sh
        - train_tasks/001/eval/whole_point_eval.py
      rubric:
        - goal: Correct scoped, canonical, readiness-eligible, and duplicate-cluster counts.
          weight: 1
        - goal: Correct focus-cluster memberships, survivor row IDs, and identity controls.
          weight: 3
        - goal: Correct canonical email and phone values for focus clusters.
          weight: 3
        - goal: Correct unusable-contact quarantine row set and quarantine controls.
          weight: 2
        - goal: Correct canonical city values, field-source resolution, and provenance controls.
          weight: 3
        - goal: Correct channel-readiness counts and outreach controls after reconciliation.
          weight: 2
        - goal: Correct regional canonical-entity rollup.
          weight: 1
