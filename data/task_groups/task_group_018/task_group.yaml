task_group:
  task_group_id: task_group_018
  scenario_id: SCN_018_court_clerk_disposition_orders_and_financial_entries
  source_examples:
    - E001
    - E002
    - E003
  domain: Legal
  description: |
    A train-predict benchmark for court-clerk disposition, order, financial-entry,
    probation-referral, license-suspension, and payment-plan workflows. The shared
    environment is a generated Court Operations Portal with case-management,
    citation, fee-schedule, form, docket, and payment-policy data. Train and test
    tasks require reconciling local hearing/petition materials with the shared
    environment while preserving official-source precedence, fee effective dates,
    unsupported-charge exclusions, installment math, and placeholder discipline.

env:
  dockerfile: env/Dockerfile
  setup: env/setup.sh
  state_mode: read_only
  files:
    - env/Dockerfile
    - env/setup.sh
    - env/app.py
    - env/generate_data.py
    - env/judge_api.py
    - env/endpoints.txt
    - env/generated/court_ops.db
    - env/generated/manifest.json

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
