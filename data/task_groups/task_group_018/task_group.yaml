task_group:
  task_group_id: task_group_018
  scenario_id: SCN_018_court_clerk_disposition_orders_and_financial_entries
  source_examples:
    - E001
    - E002
    - E003
  domain: Legal
  description: |
    Train-predict benchmark for court clerk disposition, financial entry,
    payment-plan, collateral-order, and post-disposition audit workflows.
    The shared environment exposes court operations records, fee schedules,
    payment policies, docket history, financial obligations, citations, and
    stale exports across multiple counties. Tasks require reconciling hearing
    packets with live records, applying current fee and payment rules, and
    producing clerk-ready structured outputs.

env:
  dockerfile: env/Dockerfile
  setup: env/setup.sh
  state_mode: read_only
  files:
    - env/Dockerfile
    - env/setup.sh
    - env/server.py
    - env/judge_api.py
    - env/endpoints.txt
    - env/generate_data.py
    - env/data/clerk_ops.json
    - env/data/manifest.json

