    - test_tasks/001/eval/eval.py
    - test_tasks/001/eval/scoring.json
    rubric:
    - goal: TCK-6101 outage hold and TCK-6102 authentication failure are both correctly resolved.
      weight: 2
    - goal: TCK-6103 is resolved with correct diagnostic flags.
      weight: 3
    - goal: TCK-6104 is escalated to network engineering with correct diagnostic flags.
      weight: 1
    - goal: TCK-6105 is escalated to field operations with correct diagnostic flags.
      weight: 1
