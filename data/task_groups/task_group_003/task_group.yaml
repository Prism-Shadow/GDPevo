task_group:
  task_group_id: task_group_003
  scenario_id: SCN_003_crm_service_ticket_resolution
  source_examples:
  - E001
  - E002
  - E003
  domain: CRM
  description: 'Train-predict benchmark for CRM service ticket resolution and escalation. Agents work in a shared support-console environment that exposes consumer service tickets, telecom contact-center records, network diagnostics, outages, enterprise export incidents, SLA contracts, and coordination messages. Train and test tasks cover offline ticket resolution, mobile support triage, and enterprise complaint investigation with recurring status, routing, and evidence-synthesis conventions.

    '
env:
  dockerfile: env/Dockerfile
  setup: env/setup.sh
  state_mode: read_only
  files:
  - env/endpoints.txt
  - env/Dockerfile
  - env/judge_api.py
  - env/judge_train_eval/train_001/eval/eval.py
  - env/judge_train_eval/train_001/eval/eval.sh
  - env/judge_train_eval/train_001/eval/scoring.json
  - env/judge_train_eval/train_001/output/answer.json
  - env/judge_train_eval/train_002/eval/eval.py
  - env/judge_train_eval/train_002/eval/eval.sh
  - env/judge_train_eval/train_002/eval/scoring.json
  - env/judge_train_eval/train_002/output/answer.json
  - env/judge_train_eval/train_003/eval/eval.py
  - env/judge_train_eval/train_003/eval/eval.sh
  - env/judge_train_eval/train_003/eval/scoring.json
  - env/judge_train_eval/train_003/output/answer.json
  - env/judge_train_eval/train_004/eval/eval.py
  - env/judge_train_eval/train_004/eval/eval.sh
  - env/judge_train_eval/train_004/eval/scoring.json
  - env/judge_train_eval/train_004/output/answer.json
  - env/judge_train_eval/train_005/eval/eval.py
  - env/judge_train_eval/train_005/eval/eval.sh
  - env/judge_train_eval/train_005/eval/scoring.json
  - env/judge_train_eval/train_005/output/answer.json
  - env/setup.sh
  - env/generate_data.py
  - env/server.py
  - env/README.md
  - env/data/support_data.json
  - env/data/manifest.json
train_tasks:
- task_id: train_001
  input: train_tasks/001/input/
  prompt_txt: train_tasks/001/input/prompt.txt
  payloads:
  - train_tasks/001/input/payloads/answer_template.json
  - train_tasks/001/input/payloads/ticket_batch.csv
  notes: train_tasks/001/notes/notes.md
  output: train_tasks/001/output/
  answer_json: train_tasks/001/output/answer.json
  eval:
    script: train_tasks/001/eval/eval.sh
    files:
    - train_tasks/001/eval/eval.sh
    - train_tasks/001/eval/eval.py
    - train_tasks/001/eval/scoring.json
    rubric:
    - goal: TCK-5107 has the correct resolved status and auto-troubleshooting route.
      weight: 2
    - goal: TCK-5107 diagnostic issue flags are all correct.
      weight: 2
    - goal: TCK-5131 is correctly held for outage with no diagnostics.
      weight: 3
    - goal: TCK-5184 is correctly escalated to field operations.
      weight: 3
    - goal: TCK-5184 diagnostic issue flags are all correct.
      weight: 2
    - goal: TCK-5202 is correctly failed for account ineligibility.
      weight: 2
    - goal: Batch final status counts are correct.
      weight: 1
    - goal: Customer-wait count is correct.
      weight: 1
- task_id: train_002
  input: train_tasks/002/input/
  prompt_txt: train_tasks/002/input/prompt.txt
  payloads:
  - train_tasks/002/input/payloads/answer_template.json
  - train_tasks/002/input/payloads/case_queue.json
  notes: train_tasks/002/notes/notes.md
  output: train_tasks/002/output/
  answer_json: train_tasks/002/output/answer.json
  eval:
    script: train_tasks/002/eval/eval.sh
    files:
    - train_tasks/002/eval/eval.sh
    - train_tasks/002/eval/eval.py
    - train_tasks/002/eval/scoring.json
    rubric:
    - goal: CASE-2101 selects the SIM reseat self-service fix.
      weight: 2
    - goal: CASE-2102 handles overdue suspension with payment and line resume.
      weight: 3
    - goal: CASE-2103 uses phone roaming toggle, not carrier update.
      weight: 2
    - goal: CASE-2104 grants the missing storage permission.
      weight: 2
    - goal: CASE-2105 disconnects VPN for slow data.
      weight: 2
    - goal: Queue summary self-service and billing counts are correct.
      weight: 2
    - goal: Queue summary correctly has no carrier updates or human transfers.
      weight: 1
    - goal: Case identity mapping is preserved for the final two cases.
      weight: 1
- task_id: train_003
  input: train_tasks/003/input/
  prompt_txt: train_tasks/003/input/prompt.txt
  payloads:
  - train_tasks/003/input/payloads/answer_template.json
  - train_tasks/003/input/payloads/client_complaint_email.txt
  - train_tasks/003/input/payloads/response_requirements.json
  notes: train_tasks/003/notes/notes.md
  output: train_tasks/003/output/
  answer_json: train_tasks/003/output/answer.json
  eval:
    script: train_tasks/003/eval/eval.sh
    files:
    - train_tasks/003/eval/eval.sh
    - train_tasks/003/eval/eval.py
    - train_tasks/003/eval/scoring.json
    rubric:
    - goal: Correct incident and enterprise account are identified.
      weight: 1
    - goal: Primary root cause is correctly identified.
      weight: 3
    - goal: Archived alert route is captured as a contributing issue.
      weight: 1
    - goal: Failure window and failed-day count are correct.
      weight: 3
    - goal: Backfill day count and SLA credit percent are correct.
      weight: 3
    - goal: Engineering and account owners are correct.
      weight: 2
    - goal: Channel, evidence folder, and report title follow the response convention.
      weight: 2
    - goal: Share permissions and response status are correct.
      weight: 2
- task_id: train_004
  input: train_tasks/004/input/
  prompt_txt: train_tasks/004/input/prompt.txt
  payloads:
  - train_tasks/004/input/payloads/answer_template.json
  - train_tasks/004/input/payloads/queue_snapshot.csv
  notes: train_tasks/004/notes/notes.md
  output: train_tasks/004/output/
  answer_json: train_tasks/004/output/answer.json
  eval:
    script: train_tasks/004/eval/eval.sh
    files:
    - train_tasks/004/eval/eval.sh
    - train_tasks/004/eval/eval.py
    - train_tasks/004/eval/scoring.json
    rubric:
    - goal: Outage ticket TCK-5401 is pending action without diagnostics.
      weight: 2
    - goal: Voice profile ticket TCK-5402 is resolved through diagnostics.
      weight: 2
    - goal: Invalid account ticket TCK-5403 is failed correctly.
      weight: 2
    - goal: Authentication failure ticket TCK-5404 is failed correctly.
      weight: 2
    - goal: Overdue suspended ticket TCK-5405 is routed to accounts payable and failed.
      weight: 2
    - goal: Backbone capacity ticket TCK-5406 is network engineering escalation.
      weight: 3
    - goal: Provisioning ticket TCK-5407 is tier-2 escalation.
      weight: 3
    - goal: Final status queue counts are correct.
      weight: 1
    - goal: Escalation-team queue counts are correct.
      weight: 1
- task_id: train_005
  input: train_tasks/005/input/
  prompt_txt: train_tasks/005/input/prompt.txt
  payloads:
  - train_tasks/005/input/payloads/answer_template.json
  - train_tasks/005/input/payloads/mobile_data_worklist.json
  notes: train_tasks/005/notes/notes.md
  output: train_tasks/005/output/
  answer_json: train_tasks/005/output/answer.json
  eval:
    script: train_tasks/005/eval/eval.sh
    files:
    - train_tasks/005/eval/eval.sh
    - train_tasks/005/eval/eval.py
    - train_tasks/005/eval/scoring.json
    rubric:
    - goal: CASE-2501 uses data refuel with correct amount and charge.
      weight: 3
    - goal: CASE-2502 uses carrier-side line roaming enablement.
      weight: 3
    - goal: CASE-2503 uses data saver toggle.
      weight: 2
    - goal: CASE-2504 uses network mode update.
      weight: 2
    - goal: CASE-2505 uses mobile data toggle.
      weight: 2
    - goal: No unnecessary secondary actions are proposed.
      weight: 1
    - goal: Worklist action-family counts are correct.
      weight: 2
    - goal: Total estimated customer charge is correct.
      weight: 2
test_tasks:
- task_id: test_001
