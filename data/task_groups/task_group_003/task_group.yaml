      weight: 2
    - goal: Refuel amount and customer charge for the target data-limit case are correct.
      weight: 2
    - goal: Queue route counts and secondary actions are correct.
      weight: 1
    - goal: Transfer, carrier update, and human-transfer reason sets are correct.
      weight: 1
