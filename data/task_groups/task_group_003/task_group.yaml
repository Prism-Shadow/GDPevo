      weight: 2
    - goal: Target pre-troubleshooting bandwidth floors and shortfalls are correct.
      weight: 1
    - goal: Target post-troubleshooting success/failure and remaining flag counts are correct.
      weight: 1
    - goal: Target post-troubleshooting excess totals are correct.
      weight: 3
    - goal: Root-cause escalation evidence sets and record availability are correct.
      weight: 2
- task_id: test_002
  input: test_tasks/002/input/
