task_group:
  task_group_id: task_group_022
  scenario_id: SCN_022_sql_database_analytics
  source_examples:
    - E001
    - E002
    - E003
  domain: Data Analysis
  description: |
    Train-predict benchmark for SQL database analytics and stateful query workflows over a
    generated SaaS operations database exposed through a local HTTP API. Tasks require
    schema discovery, multi-table joins, qualified production filters, exact aggregation,
    incident/ticket analysis, and approved safe data corrections before requerying.

env:
  setup: env/setup.sh
  files:
    - env/setup.sh
    - env/api_server.py
    - env/generate_data.py
    - env/schema.sql
    - env/generated/ops_analytics.sqlite
    - env/generated/manifest.json
    - env/task_env.sh

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/evaluate.py
      rubric:
        - goal: Return the required JSON schema with the exact period.
          weight: 1
        - goal: Identify the qualified AtlasDB EMEA enterprise account set.
          weight: 2
        - goal: Compute the total qualified compute_hours rounded to two decimals.
          weight: 3
        - goal: "Rank top accounts by compute_hours descending, then account_id ascending."
          weight: 3
        - goal: Provide exact regional and per-account breakdown metrics.
          weight: 2
        - goal: Apply active subscription effective-date handling.
          weight: 2
        - goal: Count telemetry_v1 rows excluded when telemetry_v2 exists for the same account/product/day.
          weight: 1
        - goal: "Exclude internal/test accounts, non-production environments, and backfill rows."
          weight: 2
  - task_id: train_002
    input: train_tasks/002/input/
    prompt_txt: train_tasks/002/input/prompt.txt
    payloads:
      - train_tasks/002/input/payloads/answer_template.json
    notes: train_tasks/002/notes/notes.md
    output: train_tasks/002/output/
    answer_json: train_tasks/002/output/answer.json
    eval:
      script: train_tasks/002/eval/eval.sh
      files:
        - train_tasks/002/eval/eval.sh
        - train_tasks/002/eval/evaluate.py
      rubric:
        - goal: Qualified HelioSync March ticket set and count are exact.
          weight: 3
        - goal: P1/P2 open or in-progress qualified ticket count is exact.
          weight: 2
        - goal: SLA breach rate is exact to 4 decimal places.
          weight: 3
        - goal: Top affected account ranking and account metrics are exact.
          weight: 2
        - goal: Duplicate ticket exclusions are reflected correctly.
          weight: 1
        - goal: Median close hours is exact to 2 decimal places.
          weight: 2
        - goal: "Canceled, internal/test, non-customer, and non-defect exclusions are reflected correctly."
          weight: 2
        - goal: Prediction follows the required JSON schema and period/product fields.
          weight: 1
  - task_id: train_003
    input: train_tasks/003/input/
    prompt_txt: train_tasks/003/input/prompt.txt
    payloads:
      - train_tasks/003/input/payloads/answer_template.json
    notes: train_tasks/003/notes/notes.md
    output: train_tasks/003/output/
    answer_json: train_tasks/003/output/answer.json
    eval:
      script: train_tasks/003/eval/eval.sh
      files:
        - train_tasks/003/eval/eval.sh
        - train_tasks/003/eval/evaluate.py
      rubric:
        - goal: exact approved target usage rows are corrected to ATLASDB
          weight: 3
        - goal: no unrelated database rows or tables are changed
          weight: 3
        - goal: audit fields are populated for the approved correction
          weight: 2
        - goal: changed_row_count reports the approved target count
          weight: 1
        - goal: total_compute_hours_after_fix matches the recomputed metric
          weight: 3
        - goal: affected_accounts matches qualified corrected enterprise accounts
          weight: 2
        - goal: top_account_after_fix matches the recomputed top account
          weight: 2
  - task_id: train_004
    input: train_tasks/004/input/
    prompt_txt: train_tasks/004/input/prompt.txt
    payloads:
      - train_tasks/004/input/payloads/answer_template.json
    notes: train_tasks/004/notes/notes.md
    output: train_tasks/004/output/
    answer_json: train_tasks/004/output/answer.json
    eval:
      script: train_tasks/004/eval/eval.sh
      files:
        - train_tasks/004/eval/eval.sh
        - train_tasks/004/eval/evaluate.py
      rubric:
        - goal: "Use the database incident window, impacted region, severity, and seven-day follow-up window."
          weight: 2
        - goal: Identify the exact impacted account set and per-account usage.
          weight: 3
        - goal: Report exact total qualified API calls during the incident window.
          weight: 2
        - goal: Return the highest-usage account by API calls with deterministic tie handling.
          weight: 2
        - goal: Identify accounts with qualifying follow-up tickets and their counts.
          weight: 2
        - goal: Report the qualifying follow-up ticket severity mix.
          weight: 1
        - goal: Report the expected usage and ticket exclusion diagnostics.
          weight: 2
        - goal: Use the required JSON response structure.
          weight: 2
  - task_id: train_005
    input: train_tasks/005/input/
    prompt_txt: train_tasks/005/input/prompt.txt
    payloads:
      - train_tasks/005/input/payloads/answer_template.json
    notes: train_tasks/005/notes/notes.md
    output: train_tasks/005/output/
    answer_json: train_tasks/005/output/answer.json
    eval:
      script: train_tasks/005/eval/eval.sh
      files:
        - train_tasks/005/eval/eval.sh
        - train_tasks/005/eval/evaluate.py
      rubric:
        - goal: correction_sql marks exactly the approved March duplicate tickets against the master ticket
          weight: 3
        - goal: correction_sql does not change unrelated ticket rows
          weight: 3
        - goal: correction_sql writes the required audit_reason and audit_updated_at values
          weight: 2
        - goal: changed_ticket_count is 3
          weight: 1
        - goal: qualified_ticket_count_after_fix matches the recomputed corrected database
          weight: 2
        - goal: backlog_by_severity matches the recomputed corrected database
          weight: 2
        - goal: sla_breach_rate_after_fix matches the recomputed corrected database
          weight: 3
        - goal: accounts_to_notify matches the recomputed corrected database in the required order
          weight: 2

