task_group:
  task_group_id: task_group_001
  scenario_id: SCN_001_crm_marketing_lead_capture
  source_examples:
    - E001
    - E002
    - E003
  domain: CRM
  description: |
    HarborCRM is a shared front-of-funnel CRM marketing environment where event
    sponsorship, trade-show prospecting, and raw contact-import workflows become
    CRM-ready accounts, contacts, campaign members, opportunities, and follow-up
    plans. The train and test tasks use the same business systems and recurring
    source-precedence, qualification, and data-hygiene conventions while varying
    events, exhibitors, imports, record states, and output schemas.

env:
  dockerfile: env/Dockerfile
  setup: env/setup.sh
  state_mode: read_only
  files:
    - env/endpoints.txt
    - env/Dockerfile
    - env/judge_api.py
    - env/judge_train_eval/train_001/eval/eval.sh
    - env/judge_train_eval/train_001/eval/evaluate.py
    - env/judge_train_eval/train_001/output/answer.json
    - env/judge_train_eval/train_002/eval/eval.sh
    - env/judge_train_eval/train_002/eval/evaluate.py
    - env/judge_train_eval/train_002/output/answer.json
    - env/judge_train_eval/train_003/eval/eval.sh
    - env/judge_train_eval/train_003/eval/evaluator.py
    - env/judge_train_eval/train_003/output/answer.json
    - env/judge_train_eval/train_004/eval/eval.sh
    - env/judge_train_eval/train_004/eval/evaluate.py
    - env/judge_train_eval/train_004/output/answer.json
    - env/judge_train_eval/train_005/eval/eval.sh
    - env/judge_train_eval/train_005/eval/evaluator.py
    - env/judge_train_eval/train_005/output/answer.json
    - env/setup.sh
    - env/generate_data.py
    - env/server.py
    - env/README.md
    - env/data/harborcrm_data.json
    - env/data/manifest.json

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/evaluate.py
      rubric:
        - goal: Correct sponsor status set.
          weight: 3
        - goal: Correct sponsor revenue totals.
          weight: 2
        - goal: Correct qualified non-sponsor leads.
          weight: 3
        - goal: Correct excluded records.
          weight: 2
        - goal: Correct lead pipeline total.
          weight: 2
        - goal: Correct follow-up due dates and counts.
          weight: 2
        - goal: Correct CRM action counts.
          weight: 1

  - task_id: train_002
    input: train_tasks/002/input/
    prompt_txt: train_tasks/002/input/prompt.txt
    payloads:
      - train_tasks/002/input/payloads/answer_template.json
    notes: train_tasks/002/notes/notes.md
    output: train_tasks/002/output/
    answer_json: train_tasks/002/output/answer.json
    eval:
      script: train_tasks/002/eval/eval.sh
      files:
        - train_tasks/002/eval/eval.sh
        - train_tasks/002/eval/evaluate.py
      rubric:
        - goal: Correct qualified manufacturer/OEM exhibitor set.
          weight: 3
        - goal: Correct platform labels for each qualified exhibitor.
          weight: 3
        - goal: Correct booth, country, and website enrichment for qualified leads.
          weight: 2
        - goal: Correct exclusion of distributor, service-only, and sensor-only near misses.
          weight: 2
        - goal: Correct priority tier assignment for qualified exhibitors.
          weight: 2
        - goal: Correct aggregate counts by platform, priority tier, and exclusion total.
          weight: 1

  - task_id: train_003
    input: train_tasks/003/input/
    prompt_txt: train_tasks/003/input/prompt.txt
    payloads:
      - train_tasks/003/input/payloads/answer_template.json
    notes: train_tasks/003/notes/notes.md
    output: train_tasks/003/output/
    answer_json: train_tasks/003/output/answer.json
    eval:
      script: train_tasks/003/eval/eval.sh
      files:
        - train_tasks/003/eval/eval.sh
        - train_tasks/003/eval/evaluator.py
      rubric:
        - goal: Correct surviving cleaned contact IDs in order.
          weight: 3
        - goal: Correct normalized email values.
          weight: 2
        - goal: Correct normalized phone values.
          weight: 2
        - goal: Correct duplicate removal count and duplicate keys.
          weight: 2
        - goal: Correct unusable and suppressed removal counts.
          weight: 2
        - goal: Correct create/update/no-import action totals.
          weight: 2
        - goal: Correct campaign member import count.
          weight: 1

  - task_id: train_004
    input: train_tasks/004/input/
    prompt_txt: train_tasks/004/input/prompt.txt
    payloads:
      - train_tasks/004/input/payloads/answer_template.json
    notes: train_tasks/004/notes/notes.md
    output: train_tasks/004/output/
    answer_json: train_tasks/004/output/answer.json
    eval:
      script: train_tasks/004/eval/eval.sh
      files:
        - train_tasks/004/eval/eval.sh
        - train_tasks/004/eval/evaluate.py
      rubric:
        - goal: Correct sponsor status set and badge sponsor/attendee classification.
          weight: 3
        - goal: Correct campaign member create/update/no-action decisions.
          weight: 2
        - goal: Correct open opportunity total for qualified non-sponsor leads.
          weight: 2
        - goal: Correct unpaid sponsor follow-up account set and amount.
          weight: 2
        - goal: Correct normalized contacts for badge-only leads.
          weight: 2
        - goal: Correct event follow-up due date.
          weight: 1
        - goal: Correct exclusion reason counts.
          weight: 1

  - task_id: train_005
    input: train_tasks/005/input/
    prompt_txt: train_tasks/005/input/prompt.txt
    payloads:
      - train_tasks/005/input/payloads/answer_template.json
    notes: train_tasks/005/notes/notes.md
    output: train_tasks/005/output/
    answer_json: train_tasks/005/output/answer.json
    eval:
      script: train_tasks/005/eval/eval.sh
      files:
        - train_tasks/005/eval/eval.sh
        - train_tasks/005/eval/evaluator.py
      rubric:
        - goal: Correct ranked qualified robotics lead order from the five AquaFarm exhibitors.
          weight: 3
        - goal: Correct platform coverage for each ranked lead.
          weight: 2
        - goal: Correct CRM action enum per ranked lead.
          weight: 2
        - goal: Correct excluded non-manufacturer accounts.
          weight: 2
        - goal: Correct aggregate opportunity estimate.
          weight: 2
        - goal: Correct existing CRM overlap count.
          weight: 1

