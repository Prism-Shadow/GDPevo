task_group:
  task_group_id: task_group_013_healthcare_intake_transfer
  scenario_id: SCN_013_healthcare_patient_intake_transfer
  source_examples:
  - E001
  - E002
  - E003
  - E004
  - E005
  domain: Healthcare Operations
  description: A train-predict benchmark for healthcare intake, transfer acceptance, referral triage, chart onboarding, and chronic-care enrollment in a shared login-based Northstar Care Intake Portal. Solvers work mainly through browser pages after login, using structured JSON outputs for deterministic business decisions.
env:
  setup: env/setup.sh
  files:
  - env/setup.sh
  - env/app.py
  - env/judge_api.py
  - env/generate_data.py
  - env/manifest.json
  - env/data/generated_data.json
  - env/README.md
train_tasks:
- task_id: train_001
  input: train_tasks/001/input/
  prompt_txt: train_tasks/001/input/prompt.txt
  payloads:
  - train_tasks/001/input/payloads/answer_template.json
  notes: train_tasks/001/notes/notes.md
  output: train_tasks/001/output/
  answer_json: train_tasks/001/output/answer.json
  eval:
    script: train_tasks/001/eval/eval.sh
    files:
    - train_tasks/001/eval/eval.sh
    - train_tasks/001/eval/evaluate.py
    rubric:
    - goal: Patient gate statuses match the expected registration gate results.
      weight: 3
    - goal: Blocked reason sets match expected administrative and clinical blockers.
      weight: 3
    - goal: Overall registration decisions match expected ready/blocked/manual-review outcomes.
      weight: 2
    - goal: Ready patient count is correct.
      weight: 1
    - goal: Highest-risk patient id is correct.
      weight: 1
    - goal: Manual-review patient id set is correct.
      weight: 2
    - goal: Pharmacy network statuses are correct.
      weight: 1
