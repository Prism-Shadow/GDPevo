task_group:
  task_group_id: task_group_015_healthcare_ehr_quality_governance
  scenario_id: SCN_015_healthcare_ehr_quality_governance
  source_examples:
    - E001
    - E002
    - E003
    - E004
    - E005
  domain: Healthcare Data Operations
  description: |
    Train-predict task group for EHR data governance and clinical record quality control. Solvers work against a shared synthetic EHR quality API with patients, clinical lists, duplicate candidates, referrals, ICD-10 codebook entries, handoff packets, service-request drafts, providers, documents, disclosures, and audit logs. Train and test tasks require duplicate reconciliation, referral-code audits, care-transition completeness review, FHIR-like service-request validation, and integrated queue decisions.

env:
  setup: env/setup.sh
  files:
    - env/setup.sh
    - env/generate_data.py
    - env/server.py
    - env/data/ehr_quality_data.json
    - env/data/public_manifest.json
    - env/data/construction_manifest.json

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
      - train_tasks/001/input/payloads/task_scope.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/eval.py
      rubric:
        - goal: Correct merge disposition, canonical target, and source patient.
          weight: 3
        - goal: Correct active problem code set preserved after merge.
          weight: 2
        - goal: Correct active medication ID set preserved after merge.
          weight: 2
        - goal: Correct active allergy label set preserved after merge.
          weight: 2
        - goal: Correctly avoid excluding any true duplicate patient record.
          weight: 1
        - goal: Correct audit event and merge audit status.
          weight: 2
        - goal: Correctly determine no provider contact action is required.
          weight: 1
        - goal: Correct stable-MRN merge reason code.
