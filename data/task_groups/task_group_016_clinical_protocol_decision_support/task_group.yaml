task_group:
  task_group_id: task_group_016_clinical_protocol_decision_support
  scenario_id: SCN_016_healthcare_clinical_protocol_decision_support
  source_examples:
    - E001
    - E002
    - E003
    - E004
    - E005
  domain: Healthcare Clinical Decision Support
  description: |
    Synthetic protocol-bound clinical decision-support tasks using a shared
    ClinicProtocol API. Train and test tasks cover head-injury triage,
    respiratory assessment, potassium replacement, FHIR-style lab retrieval,
    and complex-care escalation.

env:
  setup: env/setup.sh
  files:
    - env/setup.sh
    - env/server.py
    - env/generate_data.py
    - env/data/clinic_data.json
    - env/data/manifest.json

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/eval.py
        - train_tasks/001/eval/rubric.json
      rubric:
        - goal: Correct head-injury protocol, risk route, disposition, and CT recommendation.
          weight: 3
        - goal: Correct red-flag set from the current encounter.
          weight: 3
        - goal: Correct activity restrictions for school, sports, and driving.
          weight: 2
        - goal: Correct contraindicated actions.
          weight: 2
        - goal: Correct follow-up timing.
          weight: 1
        - goal: Correct patient and case identifiers.
          weight: 1
        - goal: Correct supporting evidence identifiers.
          weight: 1
  - task_id: train_002
    input: train_tasks/002/input/
    prompt_txt: train_tasks/002/input/prompt.txt
    payloads:
      - train_tasks/002/input/payloads/answer_template.json
    notes: train_tasks/002/notes/notes.md
    output: train_tasks/002/output/
    answer_json: train_tasks/002/output/answer.json
    eval:
      script: train_tasks/002/eval/eval.sh
      files:
        - train_tasks/002/eval/eval.sh
        - train_tasks/002/eval/eval.py
        - train_tasks/002/eval/rubric.json
      rubric:
        - goal: Correct respiratory protocol, primary assessment, and site of care.
          weight: 3
        - goal: Correct severity-factor set.
          weight: 2
        - goal: Correct required test set.
          weight: 2
        - goal: Correct antibiotic plan.
          weight: 3
        - goal: Correct contraindicated antibiotic classes.
          weight: 2
        - goal: Correct return precautions.
          weight: 1
        - goal: Correct identifiers and evidence.
          weight: 1
  - task_id: train_003
    input: train_tasks/003/input/
    prompt_txt: train_tasks/003/input/prompt.txt
    payloads:
      - train_tasks/003/input/payloads/answer_template.json
    notes: train_tasks/003/notes/notes.md
    output: train_tasks/003/output/
    answer_json: train_tasks/003/output/answer.json
    eval:
      script: train_tasks/003/eval/eval.sh
      files:
        - train_tasks/003/eval/eval.sh
        - train_tasks/003/eval/eval.py
        - train_tasks/003/eval/rubric.json
      rubric:
        - goal: Correct latest valid potassium observation.
          weight: 3
        - goal: Correct replacement-required decision.
          weight: 2
        - goal: Correct potassium dose and medication order fields.
          weight: 3
        - goal: Correct paired follow-up lab code and next-morning timing.
          weight: 3
        - goal: Correct ignored observation identifiers.
          weight: 1
        - goal: Correct patient, protocol, time, and evidence identifiers.
          weight: 1
  - task_id: train_004
    input: train_tasks/004/input/
    prompt_txt: train_tasks/004/input/prompt.txt
    payloads:
      - train_tasks/004/input/payloads/answer_template.json
    notes: train_tasks/004/notes/notes.md
    output: train_tasks/004/output/
    answer_json: train_tasks/004/output/answer.json
    eval:
      script: train_tasks/004/eval/eval.sh
      files:
        - train_tasks/004/eval/eval.sh
        - train_tasks/004/eval/eval.py
        - train_tasks/004/eval/rubric.json
      rubric:
        - goal: Correct query target and protocol.
          weight: 2
        - goal: Correct matched-observation id set.
          weight: 3
        - goal: Correct existence boolean and count.
          weight: 2
        - goal: Correct first and last matched dates.
          weight: 2
        - goal: Correct excluded observation ids.
          weight: 1
        - goal: Correct Observation resource type.
          weight: 1
  - task_id: train_005
    input: train_tasks/005/input/
    prompt_txt: train_tasks/005/input/prompt.txt
    payloads:
      - train_tasks/005/input/payloads/answer_template.json
    notes: train_tasks/005/notes/notes.md
    output: train_tasks/005/output/
    answer_json: train_tasks/005/output/answer.json
    eval:
      script: train_tasks/005/eval/eval.sh
      files:
        - train_tasks/005/eval/eval.sh
        - train_tasks/005/eval/eval.py
        - train_tasks/005/eval/rubric.json
      rubric:
        - goal: Correct risk level and program type.
          weight: 3
        - goal: Correct chart-concern set.
          weight: 2
        - goal: Correct required assessment domains.
          weight: 3
        - goal: Correct consent strategy codes.
          weight: 3
        - goal: Correct care-plan problem set.
          weight: 2
        - goal: Correct disciplines, follow-up cadence, and escalation triggers.
          weight: 2
        - goal: Correct identifiers and unsupported-guarantee avoidance.
          weight: 1

