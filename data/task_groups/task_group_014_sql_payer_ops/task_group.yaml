task_group:
  task_group_id: task_group_014_sql_payer_ops
  scenario_id: SCN_014_healthcare_payer_authorization_appeals
  source_examples:
    - E001
    - E002
    - E003
    - E004
    - E005
    - E006
    - E007
  domain: Healthcare Revenue Cycle
  description: |
    Train-predict task group for payer authorization, appeal, reimbursement,
    and profitability operations. Solvers use a shared SQLite-backed SQL query
    service to inspect realistic payer operations tables and return structured
    business decisions. The environment is shared across all tasks and exposes
    SQL over HTTP rather than PostgreSQL, direct answer APIs, or per-task data
    endpoints.

env:
  setup: env/setup.sh
  task_environment_url_template: <TASK_ENV_BASE_URL>
  query_endpoint: <TASK_ENV_BASE_URL>/query
  files:
    - env/setup.sh
    - env/server.py
    - env/generate_data.py
    - env/payer_ops.db
    - env/data_manifest.json
    - env/README.md

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
      - train_tasks/001/input/payloads/worklist_memo.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/evaluator.py
      rubric:
        - goal: Correct first-failing intake check and disposition for every target case.
          weight: 3
        - goal: Correct gold-card and clinical-review readiness decisions.
          weight: 2
        - goal: Correct urgency class, SLA due timestamp, and SLA basis.
          weight: 2
        - goal: Correct review queue or intake-halt disposition.
          weight: 2
        - goal: Correct duplicate authorization handling and duplicate count.
          weight: 2
        - goal: Correct provider follow-up item.
          weight: 1
        - goal: Correct notice-required flags and notice count.
          weight: 1

  - task_id: train_002
    input: train_tasks/002/input/
    prompt_txt: train_tasks/002/input/prompt.txt
    payloads:
      - train_tasks/002/input/payloads/answer_template.json
      - train_tasks/002/input/payloads/worklist.json
    notes: train_tasks/002/notes/notes.md
    output: train_tasks/002/output/
    answer_json: train_tasks/002/output/answer.json
    eval:
      script: train_tasks/002/eval/eval.sh
      files:
        - train_tasks/002/eval/eval.sh
        - train_tasks/002/eval/evaluate.py
      rubric:
        - goal: Correct review date.
          weight: 1
        - goal: Correct nurse recommendation and service category for every target case.
          weight: 3
        - goal: Correct MD escalation flag and reason code.
          weight: 2
        - goal: Correct criteria source selection.
          weight: 2
        - goal: Correct missing evidence key set.
          weight: 2
        - goal: Correct P2P suitability classification.
          weight: 2
        - goal: Correct approved units for nurse-approved cases.
          weight: 1
        - goal: Correct queue counts.
          weight: 1

  - task_id: train_003
    input: train_tasks/003/input/
    prompt_txt: train_tasks/003/input/prompt.txt
    payloads:
      - train_tasks/003/input/payloads/answer_template.json
