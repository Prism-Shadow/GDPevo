        - goal: Correct paid-per-unit and benchmark variance metrics.
          weight: 2
        - goal: Correct material underpayment cells and values.
          weight: 2
        - goal: Correct clinic compliance risk classification.
          weight: 2
        - goal: Correct top recovery opportunity ranking.
          weight: 2
        - goal: Correct denied, unpaid, and correction handling.
          weight: 2
        - goal: Correct total variance and recovery summary.
