          weight: 3
        - goal: Correct top three loss-driver ranking.
          weight: 2
        - goal: Correct corrective action for each flagged pair.
          weight: 2
        - goal: Correct budget variance classification.
          weight: 2
        - goal: Correct inclusion of open correction expected recovery.
          weight: 2
        - goal: Correct persistent-versus-noise classification.
          weight: 1
        - goal: Correct total projected improvement.
          weight: 1

