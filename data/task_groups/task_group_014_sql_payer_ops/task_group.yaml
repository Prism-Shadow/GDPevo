    output: train_tasks/003/output/
    answer_json: train_tasks/003/output/answer.json
    eval:
      script: train_tasks/003/eval/eval.sh
      files:
        - train_tasks/003/eval/eval.sh
        - train_tasks/003/eval/evaluator.py
      rubric:
        - goal: Correct payer appeal eligibility status by medication case.
          weight: 3
        - goal: Correct missing or failed drug-policy requirements.
          weight: 2
        - goal: Correct expedited appeal classification.
          weight: 2
        - goal: Correct manufacturer assistance eligibility, program, and blocking reasons.
          weight: 2
        - goal: Correct required assistance form and program owner.
          weight: 1
        - goal: Correct separation of payer appeal path and assistance path.
          weight: 2
        - goal: Correct appeal filing deadline and deadline status.
          weight: 2

  - task_id: train_004
    input: train_tasks/004/input/
    prompt_txt: train_tasks/004/input/prompt.txt
    payloads:
      - train_tasks/004/input/payloads/answer_template.json
