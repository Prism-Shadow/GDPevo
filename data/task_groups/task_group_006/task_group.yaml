task_group:
  task_group_id: task_group_006
  scenario_id: SCN_006_erp_procurement_supplier_receiving
  source_examples:
    - E001
    - E002
    - E003
  domain: ERP Procurement Supplier and Receiving Control
  description: |
    Train-predict benchmark for ERP procurement operations. The shared ProcureOps
    environment contains supplier sourcing, purchase order, receiving, AP invoice,
    payment, approval, budget, and vendor-risk records. Tasks require reconciling
    sourcing nomination gates, inbound receiving controls, and AP release decisions
    across shared workplace systems and task-local office payloads.

env:
  setup: env/setup.sh
  files:
    - env/setup.sh
    - env/generate_data.py
    - env/server.py
    - env/data/procureops_data.json
    - env/data/manifest.json

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
      - train_tasks/001/input/payloads/ax17_nomination_memo.md
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/evaluator.py
      rubric:
        - goal: Correct scope and as-of date.
          weight: 1
        - goal: Correct program budget and overall readiness.
          weight: 2
        - goal: Correct LMP supplier commercial decision.
          weight: 2
        - goal: Correct DRV supplier commercial decision.
          weight: 2
        - goal: Correct LMP evidence and blocker set.
          weight: 2
        - goal: Correct DRV evidence and blocker set.
          weight: 2
        - goal: Correct committee action.
          weight: 1
