task_group:
  task_group_id: task_group_023
  scenario_id: SCN_023_public_health_statistical_modeling_audit
  source_examples:
  - E001
  - E002
  - E003
  domain: Public Health Statistical Data Audit
  description: A train-predict task group where agents audit public-health statistical
    claims using a shared browser-accessible Web evidence portal. Tasks require filtering
    mixed-stratum health rows, reconciling state/county/country identifiers, pivoting
    long-format socioeconomic data, detecting anomalies, fitting deterministic statistical
    summaries, and returning exact structured JSON results.
