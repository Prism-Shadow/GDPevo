task_group:
  task_group_id: task_group_023
  scenario_id: SCN_023_public_health_statistical_modeling_audit
  source_examples:
  - E001
  - E002
  - E003
  domain: Public Health Statistical Modeling and Data Audit
  description: A train-predict benchmark for publication-grade state, county, and country public-health audits in a shared
    Web data portal. Tasks reconcile releases and identifiers, construct analytic cohorts, fit and diagnose statistical models,
    and issue controlled business conclusions.
env:
  dockerfile: env/Dockerfile
  setup: env/setup.sh
  state_mode: read_only
  files:
  - env/Dockerfile
  - env/README_OPERATOR.md
  - env/endpoints.txt
  - env/generate_data.py
  - env/generated/manifest.json
  - env/generated/noise_manifest.json
  - env/generated/observatory.sqlite
  - env/judge_api.py
  - env/judge_assets/train_001/eval/evaluator.py
  - env/judge_assets/train_002/eval/evaluator.py
  - env/judge_assets/train_003/eval/evaluator.py
  - env/judge_assets/train_004/eval/evaluator.py
  - env/judge_assets/train_005/eval/evaluator.py
  - env/judge_specs.json
  - env/server.py
  - env/setup.sh
train_tasks:
- task_id: train_001
  input: train_tasks/001/input/
  prompt_txt: train_tasks/001/input/prompt.txt
  payloads:
  - train_tasks/001/input/payloads/analysis_request.json
  - train_tasks/001/input/payloads/answer_template.json
  notes: train_tasks/001/notes/notes.md
  output: train_tasks/001/output/
  answer_json: train_tasks/001/output/answer.json
  eval:
    script: train_tasks/001/eval/eval.sh
    files:
    - train_tasks/001/eval/eval.sh
    - train_tasks/001/eval/evaluator.py
    rubric:
    - goal: Resolve all declared releases and establish the yearly, balanced, and broad cohorts.
      weight: 1
    - goal: Run the full delete-one-state fixed-effects jackknife and bias-corrected inference.
      weight: 3
    - goal: Execute nested division-blocked ridge tuning and full out-of-division prediction.
      weight: 3
    - goal: Reproduce the declared PCG32 Webb-weight wild-cluster bootstrap-t audit.
      weight: 3
    - goal: Construct all grouped split-conformal folds and aggregate calibrated coverage and width.
      weight: 3
    - goal: Reproduce trajectory PCA, deterministic clustering, and five leave-year-out stability refits.
      weight: 3
    - goal: Exhaustively refit both exposure sources over all 16 three-to-five-year subsets.
      weight: 3
    - goal: Apply all six robustness gates and the controlled transportability classification.
      weight: 2
- task_id: train_002
  input: train_tasks/002/input/
  prompt_txt: train_tasks/002/input/prompt.txt
  payloads:
  - train_tasks/002/input/payloads/analysis_request.json
  - train_tasks/002/input/payloads/answer_template.json
  notes: train_tasks/002/notes/notes.md
  output: train_tasks/002/output/
  answer_json: train_tasks/002/output/answer.json
  eval:
    script: train_tasks/002/eval/eval.sh
    files:
    - train_tasks/002/eval/eval.sh
    - train_tasks/002/eval/evaluator.py
    rubric:
    - goal: Four-year publication reconciliation and three linked cohorts
      weight: 1
    - goal: Cluster-robust multi-period difference-GMM mediation with ordered state deletions
      weight: 3
    - goal: Nested state-blocked ridge grids and outer-fold predictive diagnostics
      weight: 3
    - goal: Restricted-null paired-state wild-cluster bootstrap-t with PRNG checkpoints
      weight: 3
    - goal: State-grouped split-conformal calibration cycles and state coverage
      weight: 3
    - goal: Partial-R2 causal-mediation sensitivity surface and tipping boundary
      weight: 3
    - goal: Four-year trajectory PCA, deterministic clustering, and stability audit
      weight: 3
    - goal: Controlled six-module obesity-mediation decision
      weight: 2
- task_id: train_003
  input: train_tasks/003/input/
  prompt_txt: train_tasks/003/input/prompt.txt
  payloads:
  - train_tasks/003/input/payloads/analysis_request.json
  - train_tasks/003/input/payloads/answer_template.json
  notes: train_tasks/003/notes/notes.md
  output: train_tasks/003/output/
  answer_json: train_tasks/003/output/answer.json
  eval:
    script: train_tasks/003/eval/eval.sh
    files:
    - train_tasks/003/eval/build_gold.py
    - train_tasks/003/eval/eval.sh
    - train_tasks/003/eval/evaluator.py
    rubric:
    - goal: Reconcile all requested country labels to stable ISO3 identifiers.
      weight: 2
    - goal: Apply revision status correctly and identify unresolved scale breaks.
      weight: 3
    - goal: Construct the usable 2022 matrix and account for missing and imputed cells.
      weight: 3
    - goal: Retain the correct PCA dimension and PC1 explained variance.
      weight: 2
    - goal: Report the ordered strongest absolute PC1 loadings and their signed values.
      weight: 2
    - goal: Reproduce the candidate-k diagnostic and the requested three-cluster burden segmentation.
      weight: 2
    - goal: Estimate the region-adjusted life-expectancy association with PC1 burden.
      weight: 3
    - goal: Issue the controlled portfolio advisory supported by the panel result.
      weight: 2
- task_id: train_004
  input: train_tasks/004/input/
  prompt_txt: train_tasks/004/input/prompt.txt
  payloads:
  - train_tasks/004/input/payloads/analysis_request.json
  - train_tasks/004/input/payloads/answer_template.json
