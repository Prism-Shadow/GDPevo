  output: train_tasks/004/output/
  answer_json: train_tasks/004/output/answer.json
  eval:
    script: train_tasks/004/eval/eval.sh
    files:
    - train_tasks/004/eval/eval.sh
    - train_tasks/004/eval/evaluator.py
    rubric:
    - goal: Reconcile releases and construct the 2024 primary and strict balanced cohorts.
      weight: 1
    - goal: Reproduce the ordered delete-one-division reliability-weighted jackknife.
      weight: 3
    - goal: Reproduce every grouped nested elastic-net grid, fold diagnostic, and pooled metric.
      weight: 3
    - goal: Reproduce the seeded wild-division bootstrap-t stream, checkpoints, and test.
      weight: 3
    - goal: Construct the grouped out-of-fold conformal intervals and division diagnostics.
      weight: 3
    - goal: Reproduce trajectory PCA, deterministic clustering, and leave-one-year stability.
      weight: 3
    - goal: Enumerate all direct-versus-rollup scenarios and reproduce the Shapley decomposition.
      weight: 3
    - goal: Apply all six registered flags and the precedence decision.
      weight: 2
- task_id: train_005
  input: train_tasks/005/input/
  prompt_txt: train_tasks/005/input/prompt.txt
  payloads:
  - train_tasks/005/input/payloads/analysis_request.json
  - train_tasks/005/input/payloads/answer_template.json
  notes: train_tasks/005/notes/notes.md
  output: train_tasks/005/output/
  answer_json: train_tasks/005/output/answer.json
  eval:
    script: train_tasks/005/eval/eval.sh
    files:
    - train_tasks/005/eval/eval.sh
    - train_tasks/005/eval/evaluator.py
    rubric:
    - goal: Balanced diabetes publication cohort and ordered state census
      weight: 1
    - goal: Delete-state bias-corrected two-step GMM
      weight: 3
    - goal: Full-grid nested state-blocked elastic net and ridge
      weight: 3
    - goal: Reproducible poverty wild-cluster bootstrap-t audit
      weight: 3
    - goal: Grouped conformal coverage and ordered calibration
      weight: 3
    - goal: Diabetes/economic trajectory PCA, clustering, and delete-state stability
      weight: 3
    - goal: Exhaustive source-group perturbation surface
      weight: 3
    - goal: Six-gate diabetes deployment decision
      weight: 2
