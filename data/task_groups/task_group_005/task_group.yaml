task_group:
  task_group_id: task_group_005
  scenario_id: SCN_005_erp_finance_expense_control
  source_examples:
    - E001
    - E002
    - E003
  domain: ERP Finance Expense Control and Accounting Close
  description: |
    A train-predict benchmark for ERP finance controls. Tasks use one shared
    office environment with HR reimbursement claims, AP bills and payments,
    vendor compliance records, prepaid accounting schedules, GL balances, and
    close logs. Train and test tasks are formal finance operations tasks from
    the same distribution.

env:
  setup: env/setup.sh
  files:
    - env/setup.sh
    - env/server.py
    - env/generate_data.py
    - env/manifest.json
    - env/README.md
    - env/data/claims.json
    - env/data/bills.json
    - env/data/payments.json
    - env/data/vendors.json
    - env/data/compliance_objects.json
    - env/data/prepaid_invoices.json
    - env/data/gl_balances.json
    - env/data/close_logs.json

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/evaluate.py
      rubric:
        - goal: Correct payable reimbursement claim set.
          weight: 3
        - goal: Correct blocked reimbursement claim set.
          weight: 3
        - goal: Correct paid claim set.
          weight: 2
        - goal: Correct open AP balance total.
          weight: 2
        - goal: Correct CRM cleanup claim set.
          weight: 2
        - goal: Correct overall batch status.
          weight: 2
        - goal: Correct reviewed claim count.
          weight: 1
        - goal: Correct partition consistency.
          weight: 1
  - task_id: train_002
    input: train_tasks/002/input/
    prompt_txt: train_tasks/002/input/prompt.txt
    payloads:
      - train_tasks/002/input/payloads/answer_template.json
      - train_tasks/002/input/payloads/onboarding_batch.json
    notes: train_tasks/002/notes/notes.md
    output: train_tasks/002/output/
    answer_json: train_tasks/002/output/answer.json
    eval:
      script: train_tasks/002/eval/eval.sh
      files:
        - train_tasks/002/eval/eval.sh
        - train_tasks/002/eval/evaluator.py
      rubric:
        - goal: Correct primary vendor access decisions.
          weight: 3
        - goal: Correct remaining vendor access decisions.
          weight: 2
        - goal: Correct primary UBO counts.
          weight: 2
        - goal: Correct remaining UBO counts.
          weight: 1
        - goal: Correct primary hard-stop flags.
          weight: 3
        - goal: Correct remaining hard-stop flags.
          weight: 3
        - goal: Correct follow-up business set.
          weight: 2
        - goal: Correct release-ready boolean.
          weight: 1
  - task_id: train_003
    input: train_tasks/003/input/
    prompt_txt: train_tasks/003/input/prompt.txt
    payloads:
      - train_tasks/003/input/payloads/answer_template.json
      - train_tasks/003/input/payloads/prepaid_close_scope.json
    notes: train_tasks/003/notes/notes.md
    output: train_tasks/003/output/
    answer_json: train_tasks/003/output/answer.json
    eval:
      script: train_tasks/003/eval/eval.sh
      files:
        - train_tasks/003/eval/eval.sh
        - train_tasks/003/eval/eval.py
      rubric:
        - goal: Correct selected invoice population.
          weight: 1
        - goal: Correct account 1250 schedule totals.
          weight: 2
        - goal: Correct account 1251 schedule totals.
          weight: 2
        - goal: Correct account 1250 GL variance decision.
          weight: 2
        - goal: Correct account 1251 GL variance decision.
          weight: 2
        - goal: Correct default or missing-term invoice set.
          weight: 1
        - goal: Correct exception invoice set.
          weight: 1
        - goal: Correct invoice amortization and ending balances.
          weight: 3
        - goal: Correct invoice default and exception flags.
          weight: 1
  - task_id: train_004
    input: train_tasks/004/input/
    prompt_txt: train_tasks/004/input/prompt.txt
    payloads:
      - train_tasks/004/input/payloads/answer_template.json
      - train_tasks/004/input/payloads/stale_ap_snapshot.csv
    notes: train_tasks/004/notes/notes.md
    output: train_tasks/004/output/
    answer_json: train_tasks/004/output/answer.json
    eval:
      script: train_tasks/004/eval/eval.sh
      files:
        - train_tasks/004/eval/eval.sh
        - train_tasks/004/eval/eval.py
      rubric:
        - goal: Correct eligible claim set.
          weight: 2
        - goal: Correct not-ready claim set.
          weight: 2
        - goal: Correct balances for eligible claims.
          weight: 2
        - goal: Correct balances for not-ready claims.
          weight: 2
        - goal: Correct stale corrections for eligible claims.
          weight: 2
        - goal: Correct stale corrections for not-ready claims.
          weight: 2
        - goal: Correct close-log requirement.
          weight: 2
        - goal: Correct batch status.
          weight: 1
  - task_id: train_005
    input: train_tasks/005/input/
    prompt_txt: train_tasks/005/input/prompt.txt
    payloads:
      - train_tasks/005/input/payloads/answer_template.json
      - train_tasks/005/input/payloads/account_change_batch.json
    notes: train_tasks/005/notes/notes.md
    output: train_tasks/005/output/
    answer_json: train_tasks/005/output/answer.json
    eval:
      script: train_tasks/005/eval/eval.sh
      files:
        - train_tasks/005/eval/eval.sh
        - train_tasks/005/eval/eval.py
      rubric:
        - goal: Correct target entity set.
          weight: 1
        - goal: Correct clean release decision.
          weight: 2
        - goal: Correct remediable hold decisions.
          weight: 3
        - goal: Correct escalation decisions.
          weight: 3
        - goal: Correct bank mismatch set.
          weight: 2
        - goal: Correct invalid tax ID set.
          weight: 2
        - goal: Correct expired license set.
          weight: 2
        - goal: Correct review queue and override flags.
          weight: 2

