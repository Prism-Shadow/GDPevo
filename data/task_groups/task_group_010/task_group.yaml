      files:
        - train_tasks/004/eval/eval.sh
        - train_tasks/004/eval/eval.py
      rubric:
        - goal: Correct sell and buy trade package.
          weight: 3
        - goal: Correct post-trade HY allocation percentage.
          weight: 2
        - goal: Correct post-trade weighted modified duration.
          weight: 2
        - goal: Correct exception flags.
