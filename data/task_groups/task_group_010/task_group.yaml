    output: test_tasks/001/output/
    answer_json: test_tasks/001/output/answer.json
    eval:
      script: test_tasks/001/eval/eval.sh
      files:
        - test_tasks/001/eval/eval.sh
        - test_tasks/001/eval/eval.py
      rubric:
        - goal: Correct recommendation type, selected route, action, and primary constraint conflict.
          weight: 3
        - goal: Correct ranked route shortlist with decisions and reason enums.
          weight: 3
        - goal: Correct selected trade package with actions and notionals.
          weight: 3
        - goal: Correct current-data source precedence and detailed conflict map.
          weight: 2
        - goal: Correct rejected candidate reason map from current data and policy conventions.
          weight: 3
        - goal: Correct core post-trade size, cash, HY allocation, and duration metrics.
          weight: 2
        - goal: Correct secondary post-trade yield, BlueGas concentration, and constraint flags.
          weight: 2
        - goal: Correct private-bank client suitability decision and monitoring trigger.
          weight: 1
        - goal: Correct sales target segment and energy theme.
          weight: 1
  - task_id: test_002
