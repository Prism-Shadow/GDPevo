task_group:
  task_group_id: task_group_010
  scenario_id: SCN_010_institutional_investment_strategy_portfolio_risk
  source_examples:
    - E001
    - E002
    - E003
  domain: Finance
  description: |
    Institutional CIO desk tasks for portfolio risk and strategy decisions.
    The shared Asteria Investment Office environment exposes current portfolio
    holdings, bond issuer data, energy market signals, international equity
    index levels, allocation prior views, macro signals, and policy thresholds.
    Train and test tasks draw from the same investment workflow distribution:
    energy/fixed-income trade strategy, international correlation review, and
    cross-asset active allocation view updates.

env:
  setup: env/setup.sh
  files:
    - env/setup.sh
    - env/app.py
    - env/judge_api.py
    - env/generate_data.py
    - env/README.md
    - env/manifest.json
    - env/data/bonds.json
    - env/data/energy_market.json
    - env/data/index_levels.json
    - env/data/indices.json
    - env/data/issuers.json
    - env/data/macro_signals.json
    - env/data/opportunity_sets.json
    - env/data/policies.json
    - env/data/portfolios.json
    - env/data/prior_views.json

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
      - train_tasks/001/input/payloads/desk_request.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/eval.py
      rubric:
        - goal: Selected two BUY tickets with correct instrument ids and notionals.
          weight: 3
        - goal: Correct post-trade HY allocation percentage.
          weight: 2
        - goal: Correct post-trade weighted modified duration.
          weight: 2
        - goal: Correct HY cap and duration-band pass/fail decisions.
          weight: 2
        - goal: Correct selected-issuer, subsector, and watchlist diversification flags.
          weight: 1
        - goal: Correct sales target segment, energy theme, and source-precedence decision.
          weight: 2
  - task_id: train_002
    input: train_tasks/002/input/
    prompt_txt: train_tasks/002/input/prompt.txt
    payloads:
      - train_tasks/002/input/payloads/answer_template.json
      - train_tasks/002/input/payloads/review_request.json
    notes: train_tasks/002/notes/notes.md
    output: train_tasks/002/output/
    answer_json: train_tasks/002/output/answer.json
    eval:
      script: train_tasks/002/eval/eval.sh
      files:
        - train_tasks/002/eval/eval.sh
        - train_tasks/002/eval/eval.py
      rubric:
        - goal: Correct review window and nine-index universe.
          weight: 1
        - goal: Correct highest positive correlation pair and rounded value.
          weight: 3
        - goal: Correct lowest correlation pair and rounded value.
          weight: 3
        - goal: Correct China and Asia dependence concentration flag.
          weight: 2
        - goal: Correct diversification candidate set.
          weight: 2
        - goal: Correct two sleeve actions.
          weight: 2
  - task_id: train_003
    input: train_tasks/003/input/
    prompt_txt: train_tasks/003/input/prompt.txt
    payloads:
      - train_tasks/003/input/payloads/answer_template.json
      - train_tasks/003/input/payloads/allocation_request.json
    notes: train_tasks/003/notes/notes.md
    output: train_tasks/003/output/
    answer_json: train_tasks/003/output/answer.json
    eval:
      script: train_tasks/003/eval/eval.sh
      files:
        - train_tasks/003/eval/eval.sh
        - train_tasks/003/eval/eval.py
      rubric:
        - goal: Correct task lineage, as-of date, quarters, and policy id.
          weight: 1
        - goal: Correct core equity views.
          weight: 3
        - goal: Correct diversifier equity views.
          weight: 3
        - goal: Correct rates, credit, and currency views.
          weight: 3
        - goal: Correct view change directions.
          weight: 2
        - goal: Correct conviction levels.
          weight: 2
        - goal: Correct rationale codes.
          weight: 2
        - goal: Correct risk overlay.
          weight: 1
  - task_id: train_004
    input: train_tasks/004/input/
    prompt_txt: train_tasks/004/input/prompt.txt
    payloads:
