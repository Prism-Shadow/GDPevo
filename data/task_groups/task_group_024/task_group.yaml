task_group:
  task_group_id: task_group_024
  scenario_id: SCN_024_engineering_portfolio_work_item_analytics
  source_examples:
    - E001
    - E002
    - E003
  domain: Data Analysis
  description: |
    Train-predict benchmark for engineering portfolio, work item, SLA, and
    release-readiness analytics. Tasks use one shared Engineering Ops
    environment containing generated work items, status history, releases,
    milestones, blockers, dependencies, portfolio targets, owners, teams, and
    policy documents. Train and test tasks are formal business-analysis tasks
    from the same distribution: portfolio mix reviews, reliability/security SLA
    aging reviews, release gate rollups, and combined delivery-risk decisions.
    The release-readiness train anchor was reworked to use Ledger Flow 2026.1
    with active gates so test release-gate reconstruction has a real train
    counterpart.

env:
  setup: env/setup.sh
  files:
    - env/setup.sh
    - env/server.py
    - env/judge_api.py
    - env/generate_data.py
    - env/manifest.json
    - env/data/blockers.json
    - env/data/construction_index.json
    - env/data/dependencies.json
    - env/data/documents.json
    - env/data/milestone_items.json
    - env/data/milestones.json
    - env/data/owners.json
    - env/data/portfolio_targets.json
    - env/data/releases.json
    - env/data/sla_policies.json
    - env/data/status_history.json
    - env/data/teams.json
    - env/data/work_items.json

