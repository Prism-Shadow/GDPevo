      files:
        - test_tasks/002/eval/eval.sh
        - test_tasks/002/eval/eval.py
      rubric:
        - goal: Correct financing condition and fallback reverse-fee issue.
          weight: 1
        - goal: Correct escrow terms and seller fallback.
          weight: 1
        - goal: Correct survival, cap, basket, and de minimis deviations.
          weight: 1
        - goal: Correct employee, TSA, WARN, and service-continuity issue.
          weight: 1
        - goal: Correct MAE issue and revision posture.
          weight: 3
        - goal: Correct IP transition issue and revision posture.
          weight: 1
        - goal: Correct issue ranking and summary.
          weight: 1

  - task_id: test_003
    input: test_tasks/003/input/
    prompt_txt: test_tasks/003/input/prompt.txt
    payloads:
      - test_tasks/003/input/payloads/answer_template.json
    notes: test_tasks/003/notes/notes.md
    output: test_tasks/003/output/
    answer_json: test_tasks/003/output/answer.json
    eval:
      script: test_tasks/003/eval/eval.sh
      files:
        - test_tasks/003/eval/eval.sh
        - test_tasks/003/eval/eval.py
      rubric:
        - goal: Correct RTF threshold, deviation, dollar amounts, and exposure basis.
          weight: 2
        - goal: Correct fiduciary-out escalation decision.
          weight: 1
        - goal: Correct R&W survival escalation and full equity-value exposure.
          weight: 1
        - goal: Correct MAE restricted carve-out escalation and omitted carve-out codes.
          weight: 2
        - goal: Correct benchmark and statistical context for RTF, fiduciary-out, and MAE review.
          weight: 3
        - goal: Correct individual approval recommendations and term recommendations.
          weight: 1
        - goal: Correct aggregate risk, quantified totals, strategic context, and committee routing.
          weight: 3

  - task_id: test_004
    input: test_tasks/004/input/
    prompt_txt: test_tasks/004/input/prompt.txt
    payloads:
