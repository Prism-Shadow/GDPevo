    notes: test_tasks/004/notes/notes.md
    output: test_tasks/004/output/
    answer_json: test_tasks/004/output/answer.json
    eval:
      script: test_tasks/004/eval/eval.sh
      files:
        - test_tasks/004/eval/eval.sh
        - test_tasks/004/eval/eval.py
      rubric:
        - goal: Correct escalation-required term set.
          weight: 1
        - goal: Correct within-playbook or fallback term set.
          weight: 3
        - goal: Correct dollar exposure calculations.
          weight: 3
        - goal: Correct committee routing.
          weight: 1
        - goal: Correct negotiated fallback recommendations.
          weight: 1
        - goal: Correct approval conditions.
          weight: 1
        - goal: Correct aggregate risk tier and packet summary.
          weight: 1

  - task_id: test_005
    input: test_tasks/005/input/
    prompt_txt: test_tasks/005/input/prompt.txt
    payloads:
      - test_tasks/005/input/payloads/answer_template.json
    notes: test_tasks/005/notes/notes.md
    output: test_tasks/005/output/
    answer_json: test_tasks/005/output/answer.json
    eval:
      script: test_tasks/005/eval/eval.sh
      files:
        - test_tasks/005/eval/eval.sh
        - test_tasks/005/eval/eval.py
      rubric:
        - goal: Correct deal terms, allocation math, indemnity values, note/NWC treatment, and closing-risk lookups.
          weight: 1
        - goal: Exact controlling risk-allocation source IDs, excluding calculation-only and stale/template document sources.
          weight: 3
        - goal: Exact controlling clause source IDs, excluding accepted active clauses and rejecting stale/template clauses.
          weight: 1
        - goal: Exact override code set, excluding template-superseded facts, and exact overridden clause-code set.
          weight: 1
        - goal: Exact handling of reviewed active clauses that are accepted and must not be treated as overrides.
          weight: 1
        - goal: Correct clause-level override substance, source clauses, policy rules, actions, draft positions, and required positions.
          weight: 1
        - goal: Correct approval routing fields and summary for unrevised override triggers.
          weight: 1
        - goal: Correct final drafting posture tied to the exact source-pruned risk and clause override set.
          weight: 1
