task_group:
  task_group_id: task_group_020
  scenario_id: SCN_020_ma_transaction_contract_review_and_negotiation
  source_examples:
    - E001
    - E002
    - E003
  domain: Legal / M&A Transaction Contract Review and Negotiation
  description: |
    A train-predict benchmark for transaction-counsel workflows in a shared Web-based M&A legal operations environment. Solvers use the Aster Legal Deal Desk browser/API service to review deal profiles, draft clauses, policy/playbook records, cap tables, financial schedules, material contracts, benchmark data, and committee rules. Train and test tasks cover buyer-side term population, seller-side counterparty-paper review, and committee escalation of out-of-policy deal terms.

env:
  setup: env/setup.sh
  files:
    - env/setup.sh
    - env/server.py
    - env/judge_api.py
    - env/generate_data.py
    - env/data/dealdesk.json
    - env/data/manifest.json

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/eval.py
      rubric:
        - goal: Correct purchase price, consideration mix, active cap table source, per-share availability, and ownership-point value.
          weight: 3
        - goal: Correct seller allocation set from the active cap table.
          weight: 3
        - goal: Correct general escrow and tax escrow amounts, percentages, and policy status.
          weight: 2
        - goal: Correct working capital target, collar, and adjustment mechanic.
          weight: 2
        - goal: Correct material consent closing conditions.
          weight: 2
        - goal: Correct no-HSR conclusion and regulatory approval list.
          weight: 1
        - goal: Correct founder employment and non-compete terms.
          weight: 2

  - task_id: train_002
    input: train_tasks/002/input/
    prompt_txt: train_tasks/002/input/prompt.txt
    payloads:
      - train_tasks/002/input/payloads/answer_template.json
    notes: train_tasks/002/notes/notes.md
    output: train_tasks/002/output/
    answer_json: train_tasks/002/output/answer.json
    eval:
      script: train_tasks/002/eval/eval.sh
      files:
        - train_tasks/002/eval/eval.sh
        - train_tasks/002/eval/eval.py
      rubric:
        - goal: Correct prohibited financing condition issue and deletion position.
          weight: 3
        - goal: Correct reverse termination fee fallback recommendation and math.
          weight: 2
        - goal: Correct escrow amount, release, and seller-favorable investment terms.
          weight: 2
        - goal: Correct survival, indemnity cap, basket, and de minimis deviations.
          weight: 3
        - goal: Correct assumed-liability and working-capital reset issue.
          weight: 2
        - goal: Correct restrictive covenant narrowing.
          weight: 2
        - goal: Correct employee transfer, TSA, WARN, and IP transition issue set.
          weight: 3

  - task_id: train_003
    input: train_tasks/003/input/
    prompt_txt: train_tasks/003/input/prompt.txt
    payloads:
      - train_tasks/003/input/payloads/answer_template.json
    notes: train_tasks/003/notes/notes.md
    output: train_tasks/003/output/
    answer_json: train_tasks/003/output/answer.json
    eval:
      script: train_tasks/003/eval/eval.sh
      files:
        - train_tasks/003/eval/eval.sh
        - train_tasks/003/eval/eval.py
      rubric:
        - goal: Correct committee routing and committee member set.
          weight: 1
        - goal: Correct RTF threshold, deviation, dollar amounts, and benchmark.
          weight: 3
        - goal: Correct fiduciary-out deviation and benchmark context.
          weight: 2
        - goal: Correct R&W survival escalation and exposure.
          weight: 2
        - goal: Correct MAE restricted carve-out escalation and omitted carve-outs.
          weight: 2
        - goal: Correct BATNA, ownership, strategic rationale, and benchmark memo context.
          weight: 2
        - goal: Correct individual recommendations for each escalated term.
          weight: 3
        - goal: Correct aggregate risk tier, action, drivers, and quantified totals.
          weight: 2

  - task_id: train_004
    input: train_tasks/004/input/
    prompt_txt: train_tasks/004/input/prompt.txt
    payloads:
      - train_tasks/004/input/payloads/answer_template.json
    notes: train_tasks/004/notes/notes.md
    output: train_tasks/004/output/
    answer_json: train_tasks/004/output/answer.json
    eval:
      script: train_tasks/004/eval/eval.sh
      files:
        - train_tasks/004/eval/eval.sh
        - train_tasks/004/eval/evaluate.py
      rubric:
        - goal: Transfer-employee issue is correctly identified and positioned.
          weight: 3
        - goal: TSA and service-continuity issue is correctly identified and positioned.
          weight: 3
        - goal: Non-compete and non-solicit limits are correctly narrowed.
          weight: 2
        - goal: IP transition period and scope are correctly narrowed.
          weight: 2
        - goal: Escrow and closing deadline deviations are correctly quantified.
          weight: 2
        - goal: Priority issue severity and action set is correct.
          weight: 2

  - task_id: train_005
    input: train_tasks/005/input/
    prompt_txt: train_tasks/005/input/prompt.txt
    payloads:
      - train_tasks/005/input/payloads/answer_template.json
    notes: train_tasks/005/notes/notes.md
    output: train_tasks/005/output/
    answer_json: train_tasks/005/output/answer.json
    eval:
      script: train_tasks/005/eval/eval.sh
      files:
        - train_tasks/005/eval/eval.sh
        - train_tasks/005/eval/eval.py
      rubric:
        - goal: Correct consideration mix and seller allocation schedule.
          weight: 3
        - goal: Correct escrow, cap, basket, de minimis, survival, and NWC math.
          weight: 3
        - goal: Correct consent and HSR flags.
          weight: 2
        - goal: Correct latest risk memo overrides.
          weight: 2
        - goal: Correct policy exceptions and approval posture.
          weight: 2
        - goal: Correct drafting position enums.
          weight: 2

test_tasks:
  - task_id: test_001
    input: test_tasks/001/input/
    prompt_txt: test_tasks/001/input/prompt.txt
    payloads:
      - test_tasks/001/input/payloads/answer_template.json
    notes: test_tasks/001/notes/notes.md
    output: test_tasks/001/output/
    answer_json: test_tasks/001/output/answer.json
    eval:
      script: test_tasks/001/eval/eval.sh
      files:
        - test_tasks/001/eval/eval.sh
        - test_tasks/001/eval/eval.py
      rubric:
        - goal: Correct controlling source decisions, rejected stale/template sources, active clause IDs, and superseded source IDs.
          weight: 3
        - goal: Correct controlled drafting posture fields transferred from buyer-side term population and policy-check work.
          weight: 1
        - goal: Correct policy rule IDs, approval categories, current status, approval summary, and conditional trigger set.
          weight: 3
        - goal: Correct risk posture, non-triggered thresholds, conditional escalation details, and risk-memo override source IDs.
          weight: 1
        - goal: Correct material consent, post-closing notice, HSR, regulatory approval, and source-document treatment.
          weight: 1
        - goal: Correct employment, non-compete, transition-service, IP-confirmation, and supporting source-document fields.
          weight: 1
        - goal: Correct Lumen deal economics, controlling active cap table, per-share availability, and seller allocation set.
          weight: 1
        - goal: Correct escrow, cap, basket, de minimis, and working-capital mechanics with controlled policy status.
          weight: 1

  - task_id: test_002
    input: test_tasks/002/input/
    prompt_txt: test_tasks/002/input/prompt.txt
    payloads:
