task_group:
  task_group_id: task_group_020
  scenario_id: SCN_020_ma_transaction_contract_review_and_negotiation
  source_examples:
    - E001
    - E002
    - E003
  domain: Legal
  description: |
    A train-predict benchmark for corporate M&A transaction-counsel workflows.
    Solvers use a shared M&A deal workbench to review draft transaction terms,
    compare them with seller or buyer playbooks and committee policies, quantify
    legal and economic deviations, and return structured issue registers,
    closing packages, or escalation matrices. Train and test tasks share
    recurring source-precedence, percentage-base, risk-rating, escalation, and
    negotiation-position conventions while using different deals and output
    schemas.

env:
  dockerfile: env/Dockerfile
  setup: env/setup.sh
  state_mode: read_only
  files:
    - env/Dockerfile
    - env/setup.sh
    - env/app.py
    - env/generate_data.py
    - env/judge_api.py
    - env/endpoints.txt
    - env/requirements.txt
    - env/data/ma_workbench.db
    - env/data/manifest.json
    - env/data/construction_manifest.json

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/evaluate.py
      rubric:
        - goal: Correct issue set for seller APA review.
          weight: 3
        - goal: Correct financing condition, reverse break fee, HSR, and regulatory effort treatment.
          weight: 3
        - goal: Correct escrow amount, release, and investment-control calculations.
          weight: 2
        - goal: Correct indemnity cap, basket, and survival treatment.
          weight: 2
        - goal: Correct non-compete and non-solicit treatment.
          weight: 1
        - goal: Correct employee continuity and TSA treatment.
          weight: 2
        - goal: Correct tax allocation and law/forum treatment.
          weight: 1
        - goal: Correct priority order and summary metrics.
          weight: 2
