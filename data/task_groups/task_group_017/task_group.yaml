        - train_tasks/003/eval/eval.py
      rubric:
        - goal: Correct target custodian, matter, overall escalation status, and notice recommendation.
          weight: 1
        - goal: Identify post-hold laptop wipe with categories, counts, severity, and recovery action.
          weight: 2
        - goal: Identify shared-drive deletion with 37 deleted, 29 recovered, and 8 unrecovered.
          weight: 3
        - goal: Identify uncollected personal Gmail source and supplemental collection action.
          weight: 2
        - goal: Identify three privileged emails forwarded to outside banker as waiver risk.
          weight: 2
        - goal: Identify 12 business-only over-designations and privilege-log correction action.
          weight: 1
        - goal: Identify 45 privileged documents first-pass coded non-privileged with clawback action.
          weight: 3
        - goal: Identify 23 failed attachments split into 14 password-protected and 9 corrupt.
          weight: 2
        - goal: Rank escalations and primary actions in the required order.
          weight: 3
  - task_id: train_004
    input: train_tasks/004/input/
    prompt_txt: train_tasks/004/input/prompt.txt
    payloads:
      - train_tasks/004/input/payloads/answer_template.json
    notes: train_tasks/004/notes/notes.md
    output: train_tasks/004/output/
