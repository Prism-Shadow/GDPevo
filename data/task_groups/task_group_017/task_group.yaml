task_group:
  task_group_id: task_group_017
  scenario_id: SCN_017_white_collar_investigation_production_review
  source_examples:
    - E001
    - E002
    - E003
  domain: Legal
  description: |
    A train-predict benchmark for white-collar investigation production review.
    Solvers use a shared Investigation Review Hub to analyze subpoena categories,
    custodian collections, retention and preservation events, privilege/QC records,
    and remediation actions. Train and test tasks are formal legal operations
    tasks from the same investigation-response distribution.

env:
  dockerfile: env/Dockerfile
  setup: env/setup.sh
  state_mode: read_only
  files:
    - env/Dockerfile
    - env/setup.sh
    - env/app.py
    - env/generate_data.py
    - env/judge_api.py
    - env/requirements.txt
    - env/endpoints.txt
    - env/data/review_hub.db
    - env/data/manifest.json
    - env/data/judge_data.json

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
      - train_tasks/001/input/payloads/request_context.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/evaluator.py
        - train_tasks/001/eval/rubric.json
      rubric:
        - goal: Identify the post-subpoena personal phone preservation failure, lost source status, affected categories, and required action.
          weight: 3
        - goal: Identify the responsive R09 dealer complaint email miscoded nonresponsive and not produced, including QC reference and recode-and-produce action.
          weight: 3
        - goal: Calculate the R11 privilege-log gap as 1770 unlogged withheld documents and classify protocol status as noncompliant.
          weight: 3
        - goal: Identify the uncollected board SharePoint site as a collection gap affecting R07, R08, and R09 with collection action.
          weight: 2
        - goal: Provide correct non-complete category statuses and source references for R07, R08, R09, R11, and R15.
          weight: 2
        - goal: Provide correct rollup metrics and mark the first rolling production as not ready.
          weight: 1
        - goal: Provide the required prioritized remediation action set with correct types, owners, targets, and category impacts.
          weight: 3

  - task_id: train_002
    input: train_tasks/002/input/
    prompt_txt: train_tasks/002/input/prompt.txt
    payloads:
      - train_tasks/002/input/payloads/answer_template.json
      - train_tasks/002/input/payloads/review_scope.json
    notes: train_tasks/002/notes/notes.md
    output: train_tasks/002/output/
    answer_json: train_tasks/002/output/answer.json
    eval:
      script: train_tasks/002/eval/eval.sh
      files:
        - train_tasks/002/eval/eval.sh
        - train_tasks/002/eval/evaluator.py
        - train_tasks/002/eval/rubric.json
      rubric:
        - goal: Identify the HarborStone matter and the complete target retention-event set.
          weight: 1
        - goal: Classify 2019 lab data boxes as pre-hold policy destruction under policy section 3.1.
          weight: 2
        - goal: Classify EHS correspondence destruction as a high-risk post-hold loss with correct timing, volume, and affected categories.
          weight: 3
        - goal: Identify voicemail auto-purge and Teams active-system loss as separate communication gaps.
          weight: 2
        - goal: Treat the October 2023 Calverley audit as a required record that should still exist under a 60-month retention period.
          weight: 3
        - goal: Identify IronVault as an available seven-year email archive affecting categories D and E.
          weight: 2
        - goal: Report required numeric counts and unique affected-category set.
          weight: 2
        - goal: Provide the correct prioritized action and owner set for preservation loss, missing audit, archive collection, system gaps, and policy-compliant loss.
          weight: 2

  - task_id: train_003
    input: train_tasks/003/input/
    prompt_txt: train_tasks/003/input/prompt.txt
    payloads:
      - train_tasks/003/input/payloads/answer_template.json
      - train_tasks/003/input/payloads/review_scope.json
    notes: train_tasks/003/notes/notes.md
    output: train_tasks/003/output/
    answer_json: train_tasks/003/output/answer.json
    eval:
      script: train_tasks/003/eval/eval.sh
      files:
        - train_tasks/003/eval/eval.sh
        - train_tasks/003/eval/evaluator.py
        - train_tasks/003/eval/rubric.json
      rubric:
        - goal: Identify the Graycliff matter and required dashboard scope.
          weight: 1
        - goal: Rank the shared-drive post-hold deletion as a critical preservation loss with unrecovered valuation document references.
          weight: 3
        - goal: Identify the Hale laptop wipe as a post-hold source loss affecting SEC-1 and SEC-4.
          weight: 2
        - goal: Identify the Winslow third-party waiver privilege entry with correct count, third-party name, and waiver action.
          weight: 2
        - goal: Identify the 45-document miscoded privilege QC finding and privilege-recode exposure.
          weight: 2
        - goal: Identify Hale's uncollected personal Gmail source gap with correct impacts and collection action.
          weight: 2
        - goal: Report the required category coverage rows and dashboard metrics, including zero incomplete-log counts and separate waiver/miscoded-privilege counts.
          weight: 3
        - goal: Provide the ranked action plan for preservation disclosure, waiver assessment, privilege recoding, and personal-source collection.
          weight: 3

  - task_id: train_004
    input: train_tasks/004/input/
    prompt_txt: train_tasks/004/input/prompt.txt
    payloads:
      - train_tasks/004/input/payloads/answer_template.json
      - train_tasks/004/input/payloads/review_scope.json
    notes: train_tasks/004/notes/notes.md
    output: train_tasks/004/output/
    answer_json: train_tasks/004/output/answer.json
    eval:
      script: train_tasks/004/eval/eval.sh
      files:
        - train_tasks/004/eval/eval.sh
        - train_tasks/004/eval/evaluate.py
        - train_tasks/004/eval/rubric.json
      rubric:
        - goal: Mark SEC-C and SEC-D as not production-ready with correct blocker references, impact classes, and overall production_ready false.
          weight: 2
        - goal: Identify the clinical-risk responsive miscoding defect in SEC-C and select recode-and-produce remediation.
          weight: 3
        - goal: Identify the incomplete privilege log and calculate 475 unlogged documents from 840 withheld and 365 logged.
          weight: 3
        - goal: Identify the five legal-advice emails forwarded to a trial consultant as third-party waiver with waiver assessment action.
          weight: 2
        - goal: Identify the privilege cleanup package for over-designated counsel-copy emails and privileged documents miscoded nonprivileged.
          weight: 2
        - goal: Report the required readiness metrics for privilege, waiver, miscoding, personal-source gaps, non-ready categories, and final readiness.
          weight: 1
        - goal: Provide the prioritized action set and rank order for recoding, privilege-log supplementation, waiver assessment, and QC remediation.
          weight: 3

  - task_id: train_005
    input: train_tasks/005/input/
    prompt_txt: train_tasks/005/input/prompt.txt
    payloads:
      - train_tasks/005/input/payloads/answer_template.json
      - train_tasks/005/input/payloads/matter_context.json
    notes: train_tasks/005/notes/notes.md
    output: train_tasks/005/output/
    answer_json: train_tasks/005/output/answer.json
    eval:
      script: train_tasks/005/eval/eval.sh
      files:
        - train_tasks/005/eval/eval.sh
        - train_tasks/005/eval/evaluate.py
        - train_tasks/005/eval/rubric.json
      rubric:
        - goal: Identify the AlloyWorks matter and required dashboard scope.
          weight: 1
        - goal: Rank the off-site bid-file destruction as critical post-hold loss with correct volume, categories, status, and disclosure action.
          weight: 3
        - goal: Identify both uncollected personal messaging sources as personal-source gaps with correct categories and collection action.
          weight: 3
        - goal: Identify the AlloyWorks third-party waiver privilege entry with correct category, count, status, third-party marker, and waiver action.
          weight: 2
        - goal: Identify the AlloyWorks privilege-log gap and calculate 72 unlogged documents from 106 withheld and 34 logged.
          weight: 3
        - goal: Identify the Teams archive as an available remediation source for the deleted pricing channel and map it to categories D and E.
          weight: 2
        - goal: Identify the category F zero-claim contradiction as a responsiveness miscoding risk tied to both bid-email documents and QC finding.
          weight: 3
        - goal: Report the required category coverage rows and integer metrics for the dashboard.
          weight: 2
        - goal: Provide the required ranked action plan for preservation disclosure, waiver assessment, recoding, privilege-log supplementation, personal-source collection, and archive search.
          weight: 3

