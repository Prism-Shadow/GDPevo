        - train_tasks/002/eval/eval.py
      rubric:
        - goal: Correct matter, hold date, and complete record issue, hold defect, and source sets.
          weight: 1
        - goal: Classify 2019 lab boxes as pre-hold policy destruction and production gap.
          weight: 2
        - goal: Classify post-hold EHS box destruction as critical spoliation requiring notice.
          weight: 3
        - goal: Identify voicemail and Teams communication gaps and supplemental collection need.
          weight: 2
        - goal: Identify Ironvault seven-year archive as recoverable email source.
          weight: 2
        - goal: Identify missing October 2023 audit report as retained and requiring vendor retrieval.
          weight: 2
        - goal: Identify offsite vendor and personal-device hold defects.
          weight: 3
        - goal: Rank remediation actions for notice, vendor retrieval, collection, hold refresh, and policy-gap log.
          weight: 2
        - goal: Correct overall disclosure, blocked-category, policy-gap, and post-hold issue sets.
          weight: 1
  - task_id: train_003
