task_group:
  task_group_id: task_group_017
  scenario_id: SCN_017_white_collar_investigation_production_review
  source_examples:
    - E001
    - E002
    - E003
  domain: Legal white-collar investigation production review
  description: |
    This train-predict task group asks agents to work inside a shared legal
    investigation workspace and identify document-production, preservation,
    retention, custodian-collection, privilege, QC, and remediation issues.
    Train and test tasks come from the same production-review distribution:
    they require mapping subpoena categories to business records, collection
    events, retention rules, privilege logs, production logs, and QC evidence.

env:
  dockerfile: env/Dockerfile
  setup: env/setup.sh
  state_mode: read_only
  files:
    - env/Dockerfile
    - env/setup.sh
    - env/server.py
    - env/judge_api.py
    - env/endpoints.txt
    - env/generate_data.py
    - env/manifest.json
    - env/README.md
    - env/data/generated/matters.json
    - env/data/generated/subpoena_categories.json
    - env/data/generated/production_logs.json
    - env/data/generated/collection_events.json
    - env/data/generated/retention_rules.json
    - env/data/generated/destruction_events.json
    - env/data/generated/privilege_logs.json
    - env/data/generated/qc_events.json
    - env/data/generated/custodians.json
    - env/data/generated/documents.json

train_tasks:
  - task_id: train_001
    input: train_tasks/001/input/
    prompt_txt: train_tasks/001/input/prompt.txt
    payloads:
      - train_tasks/001/input/payloads/answer_template.json
      - train_tasks/001/input/payloads/partner_request.json
    notes: train_tasks/001/notes/notes.md
    output: train_tasks/001/output/
    answer_json: train_tasks/001/output/answer.json
    eval:
      script: train_tasks/001/eval/eval.sh
      files:
        - train_tasks/001/eval/eval.sh
        - train_tasks/001/eval/eval.py
      rubric:
        - goal: Correct matter, phase, disclosure flag, and complete affected category and issue sets.
          weight: 1
        - goal: Identify missing personal phone, Signal, and WhatsApp with post-hold disclosure action.
          weight: 3
        - goal: Identify miscoded testing-accuracy complaint email and QC supplemental-production action.
          weight: 2
        - goal: Calculate privilege log gap as 4232 withheld, 1847 logged, and 2385 unlogged.
          weight: 3
        - goal: Flag counsel communications overbreadth with 1247 withheld and zero produced.
          weight: 2
        - goal: Map affected categories to correct statuses, sources, actions, and notice flags.
          weight: 2
        - goal: Provide required ranked remediation and disclosure action plan.
          weight: 3
        - goal: Exclude noisy comparator issues from the material first-production issue set.
          weight: 1
  - task_id: train_002
    input: train_tasks/002/input/
    prompt_txt: train_tasks/002/input/prompt.txt
