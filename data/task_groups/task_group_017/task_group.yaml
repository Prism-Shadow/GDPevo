        - goal: Correct P-04 missing local PST classification and action.
          weight: 2
        - goal: Correct P-05 personal cloud and text hold-notice defect classification.
          weight: 3
        - goal: Correct prioritized supplemental, hold-refresh, laptop, Teams, archive, and vendor actions.
          weight: 3
        - goal: Correct risk-flag set and regulator-notice booleans.
          weight: 2

