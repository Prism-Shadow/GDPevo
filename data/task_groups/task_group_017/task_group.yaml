    eval:
      script: train_tasks/004/eval/eval.sh
      files:
        - train_tasks/004/eval/eval.sh
        - train_tasks/004/eval/eval.py
      rubric:
        - goal: Correct task identity and affected category set.
          weight: 2
        - goal: Correct category status core for the production and privilege issues.
          weight: 2
        - goal: Identify zero-production whistleblower/compliance category and two miscoded complaint documents.
          weight: 3
        - goal: Calculate R-10 privilege log gap as 808 unlogged documents.
          weight: 3
        - goal: Identify R-11 all-withheld counsel category as overdesignation risk.
          weight: 3
        - goal: Identify 31 privileged records coded non-privileged and clawback risk.
          weight: 2
        - goal: Assign correct required action types by category.
          weight: 2
        - goal: Provide correct remediation action records.
          weight: 2
  - task_id: train_005
    input: train_tasks/005/input/
