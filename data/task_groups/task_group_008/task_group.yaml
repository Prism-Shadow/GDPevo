    - goal: Correct estate taxable amount and estate-tax exposure.
      weight: 3
    - goal: Correct liquidity gap before planning.
      weight: 2
    - goal: Correct ILIT annual exclusion capacity and premium gap.
      weight: 3
    - goal: Correct ILIT estate-inclusion risk and outside-estate projection.
      weight: 3
    - goal: Correct trust strategy and projected heir remainder.
      weight: 2
    - goal: Correct estimated estate-tax reduction and charitable remainder context.
      weight: 2
    - goal: Correct sorted action set and source-resolution fields.
      weight: 2
