    - train_tasks/003/eval/rubric.json
    rubric:
    - goal: Correct client, analysis type, and preferred trust strategy.
      weight: 2
    - goal: Correct recommendation rationale and role for the alternate trust.
      weight: 2
    - goal: Correct taxable estate and estate-tax exposure.
      weight: 3
    - goal: Correct liquidity gap before planning.
      weight: 1
    - goal: Correct GRAT term, projected heir remainder, and estate-tax reduction.
      weight: 3
    - goal: Correct GRAT mortality inclusion risk.
      weight: 1
    - goal: Correct CRAT term, charitable remainder, and income-tax deduction.
      weight: 3
    - goal: Correct source-resolution fields for goal and asset evidence.
      weight: 2
