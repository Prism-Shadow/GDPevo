risks_and_notes:
- id: environment_durability
  detail: |
    Initial servers launched with `nohup &` were reaped between turns; restarted both the rolled
    port 8056 and the 8006 compatibility mirror as harness-managed background tasks, which then
    persisted. Health re-confirmed. No data change.
- id: transient_api_rate_limit
  detail: |
    The first reflect Phase-B batch (3 generators) died on a server-side rate limit with
    0 tokens; retried successfully after server restart. No effect on final skills.
- id: platform_session_limit
  detail: |
    A platform session limit (reset 07:00 Asia/Shanghai) killed 5 fewshot solvers
    mid-batch. 2 of them (test_003 a01/a02) had already written valid answer.json and were kept; 3
    (test_002 a03, test_003 a03, test_004 a01) produced no answer and were retried after reset.
    Token backfill attributed each of those 3 attempts to its COMPLETED retry transcript and
    discarded the failed run, so efficiency is not inflated by the platform interruption.
- id: data_regeneration_formatting
  detail: |
    Running env/setup.sh -> generate_data.py (required to start the env) overwrote
    env/data/procureops_data.json; the file's byte size changed (133273 -> 128183) but record
    counts and seed (6006) are unchanged and gold-derived values reconcile exactly (e.g. PRG-AX17
    headroom 285000.0-216430.4=68569.6 matches train_001 gold). Data is canonical and consistent
    with all gold answers. RISK BACK TO EARLIER STAGE (minor): the committed data file is not
    byte-stable under regeneration; recommend pinning a data snapshot or making generate_data.py
    output byte-identical so the shipped file is not silently replaced.
- id: test_005_identity_and_decision_concerns
  detail: |
    Two issues cap test_005 for EVERY condition. (1) Schema friction: its answer_template.json
    carries `task_id: null` (a placeholder) unlike the train templates which hardcode the literal
    task_id; gold expects 'task_group_006_test_005', which is not derivable from the inputs. (2)
    Substantive divergence: gold's decision is `release_price_amendment`, but all 15 attempts
    (base + both skills) concluded a `hold_*` decision because they read invoice AP-00002 (new
    price, no linked receipt) as an unmatched price-variance blocker. The SP1 point bundles
    task_id AND decision, so it is effectively unwinnable here, and SP6 (risk/invoice-control)
    also fails for all. SEND BACK TO EARLIER STAGE for review: (a) embed the literal task_id in
    the test_005 template, and (b) re-examine whether the release-vs-hold decision is
    unambiguously derivable from the memo + API, since a consistent, model-independent miss across
    15 attempts suggests possible under-determination.
- id: test_002_systematic_plateau
  detail: |
    test_002 scores are identical across all 3 attempts in every condition. The base model always
    fails receipt-cutoff matching, supplier_release_summary, program_summary, and payment ID
    buckets; skills only recover payment linkage + release/hold. The persistent, deterministic
    miss on the summary/bucket sub-structures suggests an under-specified output definition worth
    a quality re-check, though the gold itself is internally consistent.
- id: no_leakage_observed
  detail: |
    Solver and skill-generation subagents were each confined to a dedicated staged directory with
    only allowed files (no env/ source, no notes/, no eval/, no test answers, no cross-attempt
    skills). reflect train answers were withheld until blind train attempts were saved.
    All 45 attempts produced parseable answer.json; all evaluators returned normalized [0,1]
    scores; all 45 transcripts matched uniquely by eval_attempt_id with parent_tool_use_id
    verified in the main session.
