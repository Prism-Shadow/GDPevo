evaluation:
  metric: acc@3
  attempts_per_condition: 15
  total_solver_runs: 45
  failures: 0
  retries: 0
  all_runs_clean_context: true
  notes: >-
    Every test attempt was completed by a dedicated clean-context solver subagent
    restricted to its own attempt directory. Each was staged with only the test task
    input/, environment access instructions, and (for skill conditions) the matching
    attempt-numbered skill. All 45 produced parseable answer.json, all evaluators ran,
    and all scores fell in [0, 1]; no failures, so no retries were needed.

environment:
  start_command: python3 server.py --host 127.0.0.1 --port 8015
  port: 8015
  port_selection: random candidate rolled in 8000-8100 (not scanned upward from 8000)
  base_url: http://127.0.0.1:8015
  data_seed: 7007
  data_generation_timestamp: "2026-06-01T00:00:00Z"
  stability: >-
    Healthy (/health ok) throughout all 45 solves; every solver in every batch
    successfully queried the API and produced a validated answer. The background
    server wrapper reported exit code 144 only after the final solver batch had
    already completed, so no run was affected.

token_accounting:
  source: per-turn usage in each solver subagent transcript (<session>/subagents/agent-<id>.jsonl)
  match_method: >-
    eval_attempt_id embedded in each solver prompt (also in the subagent's first user
    message) plus meta.json toolUseId as parent_tool_use_id; all 45 matched uniquely.
  input_tokens: usage.input_tokens + usage.cache_creation_input_tokens (fresh / uncached input)
  cached_input_tokens: usage.cache_read_input_tokens
  output_tokens: usage.output_tokens
  scope: >-
    Test solver subagents only. Excludes skill generation, environment startup,
    evaluator execution, and main-agent summarization.
