# ---------------------------------------------------------------------------
# Interpretation and evaluation metadata (not part of the core metric schema)
# ---------------------------------------------------------------------------
evaluation_setup:
  metric: avg@3 (mean of 3 independent clean-context solver attempts per test task)
  conditions: [no_skill, demonstration_skill, reflection_skill]
  test_tasks: 5
  attempts_per_task: 3
  total_solver_runs: 45
  skills_per_skill_condition: 3 (independently generated, attempt-numbered)
  environment:
    service: PeopleOps Console (local HR lifecycle JSON API)
    start_command: bash task_group/task_group_012/env/setup.sh 8084
    port: 8084  # rolled randomly in 8000-8100; 8015 was occupied, 8084 was free
    base_url: http://127.0.0.1:8084/
    health: ok
    stability: stable throughout; no restarts; read-only GET usage by all solvers
  token_accounting:
    source: per-subagent session transcripts under ~/.claude/projects/<project>/<session-id>/subagents/agent-<id>.jsonl
    matching: each solver subagent matched 1:1 by eval_attempt_id in its prompt and cross-checked against meta.json toolUseId (parent_tool_use_id) in the main transcript; 45/45 matched uniquely (no missing/ambiguous).
    definitions:
      cached_input_tokens: sum of cache_read_input_tokens
      input_tokens: sum of (input_tokens + cache_creation_input_tokens)  # freshly processed input
      output_tokens: sum of output_tokens
    scope: counts only answer-writing work of the 45 test solver subagents; excludes skill generation, environment startup, evaluator execution, and main-agent work.
