task_group_id: task_group_002
scenario_id: SCN_002_crm_b2b_quote_account_response
model: Opus 4.8 (claude-opus-4-8[1m])
harness: claude_code
metric: avg@3
evaluated_on: 2026-06-15

environment:
  service: MedBridge Sales Ops API (Python stdlib HTTP JSON server)
  start_command: PORT=8094 python3 task_group/task_group_002/env/server.py
  port: 8094
  base_url: http://127.0.0.1:8094
  solver_access: read-only HTTP API (curl); endpoints exposed via environment_access.md
  seed: 62002
  restarts: 0
  notes: >-
    Data files were already present, so generate_data.py was not re-run. Server
    stayed healthy for the whole evaluation. Port rolled randomly inside 8000-8100.

token_accounting:
  source: per-subagent session transcripts (<session>/subagents/agent-<id>.jsonl)
  convention: >-
    cached_input_tokens = sum(cache_read_input_tokens);
    input_tokens = sum(input_tokens + cache_creation_input_tokens) i.e. fresh + cache-write input;
    output_tokens = sum(output_tokens). Efficiency counts only test-solver answer-writing
    subagents; skill generation, environment startup, evaluator runs, and main-agent work
    are excluded. Aggregation mirrors avg@3 (mean of 3 attempts per task, then mean of 5 tasks).
  retried_attempts: >-
    The 9 reflection_skill attempts for test_001/002/003 hit a transient upstream API
    rate-limit on first launch (no answer.json written) and were retried under the SAME
    eval_attempt_id. Tokens are attributed to the successful retry subagent only; the
    rate-limited transcripts are excluded. All other 36 solver runs matched 1:1.

