risks_and_notes:
  environment_stability: >-
    The shared API server (port 8003) died once during the base test_005 runs and was
    restarted on the same port; the two affected solvers had already retrieved all needed
    data and produced valid answers, so no score was lost. Several concurrent subagents also
    reported a transient /tmp module-shadowing collision (a stray /tmp/select.py) and worked
    around it inside their own attempt directories with no effect on outputs.
  transient_rate_limits: >-
    Two reflection skill-writer subagents and two reflection solver attempts (test_002 a01
    and a03) hit transient server rate / session-usage limits and produced no output; all
    four were re-run to completion. The superseded failed subagent ids are recorded in the
    affected run_metadata.yaml files. No attempt was scored as a failure or as 0; all 45
    runs are valid, scoreable answers.
  evaluator_validity: >-
    Each test evaluator outputs a normalized score in [0,1] (max_score 1.0) and self-scores
    the official answer to exactly 1.0, so the evaluators are sound.
  task_difficulty_concentration: >-
    test_002 and test_005 (the application-allocation / decision-matrix tasks) are extremely
    hard to score above ~0.15 even with strong skills, because their decisive high-weight
    sub-points are the exact approve/decline/participation decision SETS. The evaluator is
    valid, so these tasks are solvable, but the precise decision logic appears underdetermined
    by the public API + policy endpoint (no published per-application underwriting floors,
    participation-retention split, or concentration-denominator convention). Recommend an
    earlier-stage review of whether these decision sets are fully derivable from the exposed
    inputs; this is a difficulty/derivability concern, not an invalid task.
  leakage_controls: >-
    Information boundaries were enforced by staging only allowed files per subagent directory.
    Skills contain no test entity ids (verified by grep for NORTHSTAR/EASTGATE/SOUTHPORT/
    CENTRAL/TRISTATE_GA_AMBULANCE); reflection skills were derived from train tasks only,
    with train standard answers staged to the reflection generators only after their blind
    train attempts were saved.

environment:
  start_command: "HOST=127.0.0.1 PORT=8003 sh task_group/task_group_011/env/setup.sh"
  api_base_url: "http://127.0.0.1:8003"
  port: 8003
  port_selection: random in 8000-8100 (free on first roll)
  restarts: 1
