environment_and_risks:
  environment:
    service: Private Wealth Advisory API (read-only HTTP)
    start_command: python3 task_group/task_group_008/env/server.py --host 127.0.0.1 --port 8066
    port: 8066
    port_selection: random candidate rolled in 8000-8100; 8066 was free
    base_url: http://127.0.0.1:8066
    data: deterministic, generated by env/generate_data.py seed=802608
  environment_instability:
  - The advisory server process crashed once mid-run during the demonstration batch (the shared host also ran other concurrent eval workspaces). It was restarted cleanly on the same port 8066 and health was reverified; data is deterministic so the dataset was identical.
  - 'During the outage, 4 demonstration attempts were invalidated and re-run after restart with fresh eval_attempt_ids (suffix r1): test_004/attempt_01 and test_004/attempt_02 produced no answer (the solvers correctly refused to fabricate); test_005/attempt_02 started its own server and test_005/attempt_03 read env/advisory_rules.py (the gold solver) - both boundary violations. All 4 redos are clean and boundary-compliant under a hardened prompt.'
  - Transient provider rate-limits interrupted 2 of 3 reflection blind-solve subagents during skill generation; those were re-run. No effect on final scoring data.
  leakage_risk:
  - One invalidated demonstration attempt (test_005/attempt_03, pre-redo) had read the gold advisory_rules.py during the outage; it was discarded and re-run under strict boundary rules. The final scored answer for that cell is from the clean redo.
  - Generated skills were scanned for test-task answers, test client IDs (CLT-2001..2005), and gold filenames; only innocuous 'test_00N' task_id format examples were present (the answer schema requires echoing the task_id), which is not data leakage.
  output_schema_friction:
  - The answer template carries no explicit task_id value; solvers set it from the task folder (test_00N), which the evaluator accepts. No parse failures occurred across 45 runs.
  evaluator:
  - Exact-match evaluator; normalized score = raw_earned / raw_total. All 5 test gold answers self-score 1.0. No evaluator errors or timeouts.
  token_accounting_method: 'Per-attempt token usage is read from the solver''s per-subagent transcript at <session>/subagents/agent-<id>.jsonl, DEDUPLICATED by message.id: one API response is logged as several streaming records sharing a message.id (input/cache_creation/cache_read constant, output_tokens growing), so the final record per message.id is taken once and the four buckets summed across deduped responses (naive summing over-counts ~2-3x). Reported buckets: input_tokens (uncached), cache_creation_input_tokens, cache_read_input_tokens, output_tokens. cost_usd per response = input/1e6*5 + cache_creation/1e6*6.25 + cache_read/1e6*0.5 + output/1e6*25, summed. Matched uniquely via the eval_attempt_id in each subagent''s first message (all 45 matched, no duplicates). The parent Agent toolUseResult.totalTokens was NOT used (it is a last-turn context-size snapshot that excludes cache reads). Efficiency counts only test solver subagents (excludes skill generation, env startup, evaluation, main-agent work).'
  clean_context_verification: 'All 45 final solver subagents (and the 4 invalidated demonstration originals) were verified clean-context from their per-subagent transcripts: each subagent''s first message is its own eval_attempt_id task prompt with no inherited main-agent conversation (only harness tool/skill-availability attachments precede the work), and each transcript contains ONLY its own eval_attempt_id (no cross-task or cross-attempt leakage). Recorded per attempt as transcript.clean_context_verified and transcript.only_own_eval_id_in_transcript.'
  validity: All 3 conditions x 5 tasks x 3 attempts completed with a parseable answer, a normalized [0,1] score, and matched token usage; no attempt was scored 0 for failure or dropped.
